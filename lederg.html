<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>LEDERG v2.0 — чат без глюков</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#0f172a; --sidebar:#1e293b; --card:#334155; --text:#f8fafc;
      --msg-me:#2563eb; --msg-other:#334155; --accent:#3b82f6;
      --border:rgba(255,255,255,0.1);
    }
    body.light {
      --bg:#f1f5f9; --sidebar:#ffffff; --card:#e2e8f0; --text:#0f172a;
      --msg-me:#3b82f6; --msg-other:#e2e8f0; --accent:#2563eb;
      --border:rgba(0,0,0,0.1);
    }
    body { font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; }
    .app { display:flex; height:100vh; }
    .auth { width:100%; max-width:400px; margin:auto; padding:2rem; background:var(--sidebar); border-radius:24px; box-shadow:0 25px 50px rgba(0,0,0,0.3); }
    .auth h2 { text-align:center; margin-bottom:1.5rem; }
    .auth input { width:100%; padding:12px; margin:8px 0; background:var(--bg); border:1px solid var(--border); border-radius:12px; color:var(--text); outline:none; }
    .auth .tabs { display:flex; gap:8px; margin-bottom:1rem; }
    .auth .tab { flex:1; text-align:center; padding:8px; border-radius:12px; cursor:pointer; background:var(--card); }
    .auth .tab.active { background:var(--accent); color:white; }
    .auth button { width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:12px; margin-top:8px; cursor:pointer; }
    .error { color:#f87171; font-size:0.85rem; margin-top:4px; }
    .chat { display:none; flex:1; flex-direction:column; }
    .sidebar { width:280px; background:var(--sidebar); display:flex; flex-direction:column; border-right:1px solid var(--border); }
    .profile { padding:16px; display:flex; align-items:center; gap:12px; }
    .profile img { width:40px; height:40px; border-radius:50%; background:var(--accent); }
    .chats { flex:1; overflow-y:auto; }
    .chat-item { padding:12px; cursor:pointer; border-bottom:1px solid var(--border); display:flex; gap:12px; }
    .chat-item:hover { background:var(--card); }
    .chat-item .avatar { width:40px; height:40px; border-radius:50%; background:var(--accent); color:white; display:flex; align-items:center; justify-content:center; font-weight:bold; }
    .main { flex:1; display:flex; flex-direction:column; }
    .header { padding:16px; background:var(--sidebar); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
    .messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
    .msg { max-width:75%; padding:10px 14px; border-radius:18px; position:relative; }
    .msg.me { align-self:flex-end; background:var(--msg-me); color:white; }
    .msg.other { align-self:flex-start; background:var(--msg-other); }
    .msg .time { font-size:0.7rem; opacity:0.7; margin-top:4px; }
    .input-area { padding:12px; background:var(--sidebar); display:flex; gap:8px; }
    .input-area input { flex:1; padding:12px; background:var(--bg); border:1px solid var(--border); border-radius:24px; color:var(--text); outline:none; }
    .fab { position:fixed; bottom:24px; right:24px; width:56px; height:56px; border-radius:28px; background:var(--accent); color:white; font-size:24px; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 8px 20px rgba(0,0,0,0.3); }
    @media (max-width:640px) {
      .sidebar { display:none; position:absolute; z-index:10; height:100%; }
      .sidebar.open { display:flex; }
    }
  </style>
</head>
<body class="light">
<div class="app" id="app">
  <!-- ЭКРАН АВТОРИЗАЦИИ -->
  <div id="authScreen" class="auth">
    <h2>⚡ LEDERG v2.0</h2>
    <div class="tabs">
      <div id="tabLogin" class="tab active">Вход</div>
      <div id="tabSignup" class="tab">Регистрация</div>
    </div>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Пароль">
    <input type="text" id="nickname" placeholder="Никнейм" style="display:none;">
    <button id="authBtn">Войти</button>
    <div id="authError" class="error"></div>
  </div>

  <!-- ОСНОВНОЙ ЭКРАН ЧАТОВ -->
  <div id="chatScreen" class="chat" style="display:none;">
    <div class="sidebar" id="sidebar">
      <div class="profile">
        <img id="userAvatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%233b82f6'/%3E%3Ctext x='50' y='50' text-anchor='middle' dy='.35em' fill='white' font-size='40'%3E😎%3C/text%3E%3C/svg%3E" width="40" height="40">
        <div>
          <div id="userNickDisplay"></div>
          <div style="font-size:0.75rem; opacity:0.7;" id="onlineStatus"></div>
        </div>
        <button id="logoutBtn" style="margin-left:auto; background:none; border:none; color:var(--text); cursor:pointer;"><i class="fas fa-sign-out-alt"></i></button>
      </div>
      <div style="padding:8px;">
        <input type="text" id="searchInput" placeholder="Поиск пользователей..." style="width:100%; padding:8px; border-radius:12px; border:1px solid var(--border); background:var(--bg); color:var(--text);">
      </div>
      <div class="chats" id="chatsList"></div>
      <button id="newChannelBtn" style="margin:8px; padding:10px; background:var(--accent); color:white; border:none; border-radius:12px;">+ Создать канал</button>
    </div>
    <div class="main">
      <div class="header">
        <button id="menuBtn" style="background:none; border:none; color:var(--text); display:none;"><i class="fas fa-bars"></i></button>
        <div id="chatTitle">Выберите чат</div>
      </div>
      <div class="messages" id="messages"></div>
      <div class="input-area" id="inputArea" style="display:none;">
        <input type="file" id="fileInput" style="display:none;">
        <button id="attachBtn" style="background:none; border:none; color:var(--text);"><i class="fas fa-paperclip"></i></button>
        <input type="text" id="messageInput" placeholder="Напишите сообщение...">
        <button id="sendBtn" style="background:var(--accent); border:none; color:white; border-radius:50%; width:40px; height:40px;"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>
</div>

<script>
  // КОНФИГУРАЦИЯ
  const SUPABASE_URL = 'https://whfcdzkfadqmkokjhogk.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_gNERJsFyw4PUE2xNjHOR9A_0-CJMrVR';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // DOM
  const authScreen = document.getElementById('authScreen');
  const chatScreen = document.getElementById('chatScreen');
  const authBtn = document.getElementById('authBtn');
  const tabLogin = document.getElementById('tabLogin');
  const tabSignup = document.getElementById('tabSignup');
  const emailInp = document.getElementById('email');
  const passInp = document.getElementById('password');
  const nickInp = document.getElementById('nickname');
  const authError = document.getElementById('authError');

  let currentUser = null;
  let currentChat = null;
  let channelSub = null;
  let onlineInterval = null;

  // АВТОРИЗАЦИЯ
  let mode = 'login';
  tabLogin.onclick = () => { mode='login'; updateAuthUI(); };
  tabSignup.onclick = () => { mode='signup'; updateAuthUI(); };
  function updateAuthUI() {
    tabLogin.classList.toggle('active', mode==='login');
    tabSignup.classList.toggle('active', mode==='signup');
    nickInp.style.display = mode==='signup' ? 'block' : 'none';
    authBtn.textContent = mode==='login' ? 'Войти' : 'Зарегистрироваться';
    authError.textContent = '';
  }

  authBtn.onclick = async () => {
    const email = emailInp.value.trim();
    const password = passInp.value.trim();
    const nickname = nickInp.value.trim();
    authError.textContent = '';
    if (!email || !password) return authError.textContent = 'Заполните email и пароль';
    if (mode==='signup' && !nickname) return authError.textContent = 'Придумайте никнейм';
    authBtn.disabled = true;
    try {
      if (mode==='login') {
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
      } else {
        const { error } = await supabase.auth.signUp({ email, password, options: { data: { nickname } } });
        if (error) throw error;
        authError.textContent = 'Регистрация успешна! Проверьте почту (если требуется)';
      }
    } catch (e) {
      authError.textContent = e.message;
    } finally {
      authBtn.disabled = false;
    }
  };

  supabase.auth.onAuthStateChange(async (event, session) => {
    if (session?.user) {
      currentUser = session.user;
      const { data: profile } = await supabase.from('users').select('nickname').eq('id', currentUser.id).single();
      if (profile) {
        document.getElementById('userNickDisplay').textContent = profile.nickname;
      }
      authScreen.style.display = 'none';
      chatScreen.style.display = 'flex';
      initChat();
    } else {
      authScreen.style.display = 'block';
      chatScreen.style.display = 'none';
      if (channelSub) supabase.removeChannel(channelSub);
      if (onlineInterval) clearInterval(onlineInterval);
    }
  });

  // ЧАТ-ДВИЖОК
  async function initChat() {
    await loadChats();
    startOnlinePing();
    listenGlobal();
  }

  async function loadChats() {
    const { data: convs } = await supabase.from('conversations').select('*').or(`participant1.eq.${currentUser.id},participant2.eq.${currentUser.id}`);
    const list = document.getElementById('chatsList');
    list.innerHTML = '';
    for (let c of (convs||[])) {
      const otherId = c.participant1===currentUser.id ? c.participant2 : c.participant1;
      const { data: other } = await supabase.from('users').select('nickname').eq('id', otherId).single();
      if (!other) continue;
      const div = document.createElement('div');
      div.className = 'chat-item';
      div.innerHTML = `<div class="avatar">${other.nickname[0]}</div><div><strong>${other.nickname}</strong><br><small>${c.last_message||''}</small></div>`;
      div.onclick = () => openPrivateChat(c.id, other.nickname);
      list.appendChild(div);
    }
    // Каналы
    const { data: mems } = await supabase.from('channel_members').select('channel_id').eq('user_id', currentUser.id);
    for (let m of (mems||[])) {
      const { data: chan } = await supabase.from('channels').select('*').eq('id', m.channel_id).single();
      if (!chan) continue;
      const div = document.createElement('div');
      div.className = 'chat-item';
      div.innerHTML = `<div class="avatar">#</div><div><strong>${chan.name}</strong><br><small>Канал</small></div>`;
      div.onclick = () => openChannel(chan.id, chan.name);
      list.appendChild(div);
    }
  }

  function openPrivateChat(convId, name) {
    openChat({ id: convId, type: 'private', name });
  }
  function openChannel(chanId, name) {
    openChat({ id: chanId, type: 'channel', name });
  }

  async function openChat(chat) {
    if (channelSub) supabase.removeChannel(channelSub);
    currentChat = chat;
    document.getElementById('chatTitle').textContent = chat.name;
    document.getElementById('inputArea').style.display = 'flex';
    document.getElementById('messages').innerHTML = '';
    await loadMessages();
    const table = chat.type==='private' ? 'messages' : 'channel_messages';
    const col = chat.type==='private' ? 'conversation_id' : 'channel_id';
    channelSub = supabase.channel(`chat:${chat.id}`)
      .on('postgres_changes', { event:'INSERT', schema:'public', table, filter:`${col}=eq.${chat.id}` }, payload => {
        appendMessage(payload.new);
      })
      .subscribe();
  }

  async function loadMessages() {
    const table = currentChat.type==='private' ? 'messages' : 'channel_messages';
    const col = currentChat.type==='private' ? 'conversation_id' : 'channel_id';
    const { data } = await supabase.from(table).select('*').eq(col, currentChat.id).order('created_at', { ascending:true });
    const msgs = document.getElementById('messages');
    msgs.innerHTML = '';
    data?.forEach(appendMessage);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function appendMessage(msg) {
    const div = document.createElement('div');
    const isMe = msg.from_user_id === currentUser.id;
    div.className = `msg ${isMe ? 'me' : 'other'}`;
    div.innerHTML = `${msg.text||''}${msg.media_url ? `<br><img src="${msg.media_url}" style="max-width:200px; border-radius:8px;">` : ''}<div class="time">${new Date(msg.created_at).toLocaleTimeString()}</div>`;
    document.getElementById('messages').appendChild(div);
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
  }

  document.getElementById('sendBtn').onclick = async () => {
    const text = document.getElementById('messageInput').value.trim();
    if (!text) return;
    const table = currentChat.type==='private' ? 'messages' : 'channel_messages';
    const col = currentChat.type==='private' ? 'conversation_id' : 'channel_id';
    await supabase.from(table).insert([{ [col]: currentChat.id, from_user_id: currentUser.id, text }]);
    document.getElementById('messageInput').value = '';
  };

  // Поиск и создание диалога
  document.getElementById('searchInput').addEventListener('keypress', async (e) => {
    if (e.key !== 'Enter') return;
    const q = e.target.value.trim();
    if (!q) return;
    const { data: users } = await supabase.from('users').select('*').ilike('nickname', `%${q}%`).neq('id', currentUser.id).limit(5);
    if (!users.length) return;
    const user = users[0];
    const [p1,p2] = [currentUser.id, user.id].sort();
    let { data: conv } = await supabase.from('conversations').select('*').eq('participant1', p1).eq('participant2', p2).single();
    if (!conv) {
      const { data: newConv } = await supabase.from('conversations').insert([{ participant1:p1, participant2:p2 }]).select().single();
      conv = newConv;
    }
    await loadChats();
    openPrivateChat(conv.id, user.nickname);
    e.target.value = '';
  });

  // Онлайн статус
  async function updateOnline() {
    if (!currentUser) return;
    await supabase.from('users').update({ online: true, last_seen: new Date() }).eq('id', currentUser.id);
  }
  function startOnlinePing() {
    updateOnline();
    if (onlineInterval) clearInterval(onlineInterval);
    onlineInterval = setInterval(updateOnline, 20000);
  }

  window.addEventListener('beforeunload', () => {
    if (currentUser) supabase.from('users').update({ online: false, last_seen: new Date() }).eq('id', currentUser.id);
  });

  // Глобальные уведомления
  function listenGlobal() {
    supabase.channel('global')
      .on('postgres_changes', { event:'INSERT', schema:'public', table:'messages' }, () => loadChats())
      .on('postgres_changes', { event:'INSERT', schema:'public', table:'channel_messages' }, () => loadChats())
      .subscribe();
  }

  document.getElementById('logoutBtn').onclick = () => supabase.auth.signOut();
  document.getElementById('newChannelBtn').onclick = async () => {
    const name = prompt('Название канала:');
    if (!name) return;
    const { data: chan } = await supabase.from('channels').insert([{ name, created_by: currentUser.id }]).select().single();
    await supabase.from('channel_members').insert([{ channel_id: chan.id, user_id: currentUser.id }]);
    await loadChats();
    openChannel(chan.id, chan.name);
  };
  document.getElementById('menuBtn').onclick = () => document.getElementById('sidebar').classList.toggle('open');
  // Адаптив
  if (window.innerWidth <= 640) document.getElementById('menuBtn').style.display = 'block';
  window.addEventListener('resize', () => {
    document.getElementById('menuBtn').style.display = window.innerWidth <= 640 ? 'block' : 'none';
  });
</script>
</body>
</html>
