<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LEDERG STYLE — Мессенджер твоего бренда</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Кастомный шрифт LEDERG -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap');
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        /* LEDERG уникальные переменные */
        :root {
            --ledurg-primary: #00f2fe;
            --ledurg-secondary: #4facfe;
            --ledurg-dark: #0a0f1e;
            --ledurg-card: #141b2b;
            --ledurg-input: #1e2a3a;
            --ledurg-text: #ffffff;
            --ledurg-text-secondary: #a0aec0;
            --ledurg-accent: #00d26a;
            --ledurg-danger: #ff4757;
            --ledurg-glow: 0 0 15px rgba(0,242,254,0.3);
            --ledurg-gradient: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --ledurg-bg-gradient: radial-gradient(circle at 10% 20%, rgba(0,242,254,0.05) 0%, rgba(10,15,30,1) 90%);
        }
        body {
            font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
            background: var(--ledurg-dark);
            height: 100vh;
            overflow: hidden;
            color: var(--ledurg-text);
        }
        /* Анимации LEDERG */
        @keyframes ledergPulse {
            0% { box-shadow: 0 0 0 0 rgba(0,242,254,0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0,242,254,0); }
            100% { box-shadow: 0 0 0 0 rgba(0,242,254,0); }
        }
        @keyframes ledergSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes ledergRipple {
            0% { transform: scale(0); opacity: 0.6; }
            100% { transform: scale(2); opacity: 0; }
        }
        /* Стилизация скролла LEDERG */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: var(--ledurg-input); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--ledurg-primary); border-radius: 10px; }
        /* Авторизация */
        .auth-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: var(--ledurg-bg-gradient);
            padding: 20px;
        }
        .auth-card {
            background: var(--ledurg-card);
            border-radius: 32px;
            padding: 2rem;
            width: 100%;
            max-width: 360px;
            box-shadow: var(--ledurg-glow);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0,242,254,0.2);
        }
        .auth-card h2 {
            background: var(--ledurg-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .auth-card input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 12px;
            background: var(--ledurg-input);
            border: 1px solid rgba(0,242,254,0.2);
            border-radius: 20px;
            color: var(--ledurg-text);
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }
        .auth-card input:focus { border-color: var(--ledurg-primary); box-shadow: 0 0 8px rgba(0,242,254,0.3); }
        .auth-card button {
            width: 100%;
            padding: 12px;
            background: var(--ledurg-gradient);
            border: none;
            border-radius: 28px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .auth-card button:hover { transform: scale(0.98); opacity: 0.9; }
        .toggle-mode { text-align: center; margin-top: 16px; color: var(--ledurg-text-secondary); cursor: pointer; }
        .error-msg { color: var(--ledurg-danger); text-align: center; font-size: 0.8rem; margin-top: 8px; }
        /* Основной экран */
        .chat-screen { display: none; height: 100vh; width: 100%; position: relative; }
        .main-layout { display: flex; height: 100%; }
        /* Боковая панель LEDERG */
        .sidebar {
            width: 320px;
            background: var(--ledurg-card);
            border-right: 1px solid rgba(0,242,254,0.1);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 20;
        }
        .user-info {
            padding: 16px;
            background: rgba(20,27,43,0.8);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,242,254,0.1);
        }
        .user-details { display: flex; align-items: center; gap: 10px; }
        .avatar-small {
            width: 40px; height: 40px;
            background: var(--ledurg-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            position: relative;
        }
        .user-nick { font-weight: 600; }
        .logout-btn, .settings-btn { background: none; border: none; color: var(--ledurg-text-secondary); font-size: 1.2rem; cursor: pointer; padding: 8px; transition: 0.2s; }
        .logout-btn:hover, .settings-btn:hover { color: var(--ledurg-primary); }
        .tabs {
            display: flex;
            padding: 8px 12px;
            gap: 8px;
            border-bottom: 1px solid rgba(0,242,254,0.1);
        }
        .tab-btn {
            flex: 1;
            background: var(--ledurg-input);
            border: none;
            color: var(--ledurg-text-secondary);
            padding: 8px;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab-btn.active { background: var(--ledurg-gradient); color: white; }
        .search-box {
            padding: 12px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 10px 14px;
            background: var(--ledurg-input);
            border: 1px solid rgba(0,242,254,0.2);
            border-radius: 28px;
            color: var(--ledurg-text);
            outline: none;
        }
        .search-results {
            position: absolute;
            top: 55px;
            left: 12px;
            right: 12px;
            background: var(--ledurg-card);
            border-radius: 16px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 30;
            display: none;
            box-shadow: var(--ledurg-glow);
            border: 1px solid rgba(0,242,254,0.2);
        }
        .search-result { padding: 12px; color: var(--ledurg-text); cursor: pointer; border-bottom: 1px solid rgba(0,242,254,0.1); display: flex; align-items: center; gap: 10px; }
        .chats-list { flex: 1; overflow-y: auto; }
        .chat-item {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid rgba(0,242,254,0.05);
            transition: 0.1s;
        }
        .chat-item.active { background: rgba(0,242,254,0.1); }
        .avatar {
            width: 48px; height: 48px;
            background: var(--ledurg-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            position: relative;
        }
        .chat-info { flex: 1; overflow: hidden; }
        .chat-name { font-weight: 600; }
        .chat-last { color: var(--ledurg-text-secondary); font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        /* Область чата */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--ledurg-bg-gradient);
            height: 100%;
            min-height: 0;
            position: relative;
        }
        .chat-header {
            padding: 12px 16px;
            background: rgba(20,27,43,0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,242,254,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .back-btn {
            display: none;
            background: none;
            border: none;
            color: var(--ledurg-text);
            font-size: 1.4rem;
            cursor: pointer;
        }
        .chat-title { flex: 1; font-weight: 700; background: var(--ledurg-gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .chat-actions button { background: none; border: none; color: var(--ledurg-text-secondary); cursor: pointer; font-size: 1.2rem; margin-left: 12px; transition: 0.2s; }
        .chat-actions button:hover { color: var(--ledurg-primary); }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            animation: ledergSlideUp 0.2s ease;
            position: relative;
        }
        .message-self { align-self: flex-end; }
        .message-bubble {
            background: var(--ledurg-input);
            padding: 10px 16px;
            border-radius: 20px;
            border-bottom-left-radius: 4px;
            color: var(--ledurg-text);
            word-wrap: break-word;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid rgba(0,242,254,0.2);
        }
        .message-self .message-bubble {
            background: linear-gradient(135deg, #00d26a 0%, #00f2fe 100%);
            border-bottom-right-radius: 4px;
            border-bottom-left-radius: 20px;
        }
        .message-meta { font-size: 0.65rem; color: var(--ledurg-text-secondary); margin: 4px 8px 0; display: flex; gap: 8px; }
        .reactions { display: flex; gap: 4px; margin-top: 4px; }
        .reaction { background: var(--ledurg-input); border-radius: 12px; padding: 2px 6px; font-size: 0.7rem; cursor: pointer; transition: 0.1s; }
        .reaction:hover { transform: scale(1.1); }
        .input-area {
            padding: 12px;
            background: rgba(20,27,43,0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0,242,254,0.1);
            flex-shrink: 0;
        }
        .input-row { display: flex; gap: 8px; align-items: center; }
        #messageInput {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid rgba(0,242,254,0.2);
            border-radius: 30px;
            background: var(--ledurg-input);
            color: var(--ledurg-text);
            outline: none;
            transition: 0.2s;
        }
        #messageInput:focus { border-color: var(--ledurg-primary); box-shadow: var(--ledurg-glow); }
        .tool-btn {
            background: none;
            border: none;
            color: var(--ledurg-text-secondary);
            font-size: 1.3rem;
            cursor: pointer;
            padding: 8px;
            transition: 0.2s;
        }
        .tool-btn:hover { color: var(--ledurg-primary); transform: scale(1.05); }
        .fab {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: var(--ledurg-gradient);
            width: 56px;
            height: 56px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: var(--ledurg-glow);
            transition: 0.2s;
            z-index: 15;
        }
        .fab:hover { transform: scale(1.05); }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal.active { visibility: visible; opacity: 1; }
        .modal-content {
            background: var(--ledurg-card);
            border-radius: 28px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(0,242,254,0.2);
            box-shadow: var(--ledurg-glow);
        }
        .context-menu {
            position: fixed;
            background: var(--ledurg-card);
            border-radius: 16px;
            box-shadow: var(--ledurg-glow);
            z-index: 2000;
            display: none;
            overflow: hidden;
            border: 1px solid rgba(0,242,254,0.2);
        }
        .context-menu-item { padding: 12px 24px; color: var(--ledurg-text); cursor: pointer; transition: 0.1s; }
        .context-menu-item:hover { background: rgba(0,242,254,0.2); }
        /* Полная адаптация под телефон */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: 0;
                top: 0;
                height: 100%;
                width: 85%;
                max-width: 280px;
                transform: translateX(-100%);
                z-index: 30;
            }
            .sidebar.open { transform: translateX(0); }
            .back-btn { display: block; }
            .message { max-width: 90%; }
            .chat-title { font-size: 1rem; }
            .fab { width: 48px; height: 48px; font-size: 20px; bottom: 16px; right: 16px; }
            .tool-btn { font-size: 1.1rem; padding: 6px; }
            #messageInput { padding: 10px 14px; font-size: 0.95rem; }
        }
        /* Дополнительные утилиты */
        .ripple { position: relative; overflow: hidden; }
        .ripple::after { content: ''; position: absolute; top: 50%; left: 50%; width: 0; height: 0; border-radius: 50%; background: rgba(255,255,255,0.5); transform: translate(-50%, -50%); transition: width 0.3s, height 0.3s; }
        .ripple:active::after { width: 100px; height: 100px; opacity: 0; }
        .skeleton { background: linear-gradient(90deg, var(--ledurg-input) 25%, rgba(0,242,254,0.2) 50%, var(--ledurg-input) 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>
<div class="app">
    <div id="authScreen" class="auth-screen">
        <div class="auth-card">
            <h2>◢ LEDERG ◣</h2>
            <input type="email" id="emailInput" placeholder="Email">
            <input type="password" id="passwordInput" placeholder="Пароль">
            <input type="text" id="nicknameInput" placeholder="Никнейм (при регистрации)" style="display: none;">
            <button id="submitAuthBtn">Войти</button>
            <div class="toggle-mode" id="toggleAuthMode">Создать аккаунт</div>
            <div id="authError" class="error-msg"></div>
        </div>
    </div>

    <div id="chatScreen" class="chat-screen">
        <div class="main-layout">
            <div id="sidebar" class="sidebar">
                <div class="user-info">
                    <div class="user-details">
                        <div class="avatar-small" id="userAvatarSmall">L</div>
                        <span id="userNickDisplay" class="user-nick"></span>
                    </div>
                    <div>
                        <button id="settingsBtn" class="settings-btn"><i class="fas fa-cog"></i></button>
                        <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i></button>
                    </div>
                </div>
                <div class="tabs">
                    <button id="tabChats" class="tab-btn active"><i class="fas fa-comment"></i> Чаты</button>
                    <button id="tabChannels" class="tab-btn"><i class="fas fa-broadcast-tower"></i> Каналы</button>
                </div>
                <div class="search-box">
                    <input type="text" id="globalSearch" placeholder="🔍 Поиск...">
                    <div id="searchResultsPanel" class="search-results"></div>
                </div>
                <div id="chatsList" class="chats-list"></div>
            </div>

            <div class="chat-area">
                <div class="chat-header">
                    <button id="backBtn" class="back-btn"><i class="fas fa-bars"></i></button>
                    <div class="chat-title" id="currentChatTitle">LEDERG</div>
                    <div class="chat-actions">
                        <button id="searchInChatBtn" title="Поиск"><i class="fas fa-search"></i></button>
                        <button id="statsBtn" title="Статистика"><i class="fas fa-chart-simple"></i></button>
                    </div>
                </div>
                <div id="typingIndicator" class="typing-indicator" style="font-size:0.7rem; padding:0 16px; color:var(--ledurg-primary);"></div>
                <div id="messagesArea" class="messages-area"></div>
                <div class="input-area">
                    <div class="input-row">
                        <button id="emojiBtn" class="tool-btn"><i class="far fa-smile-wink"></i></button>
                        <button id="attachBtn" class="tool-btn"><i class="fas fa-paperclip"></i></button>
                        <button id="voiceBtn" class="tool-btn"><i class="fas fa-microphone"></i></button>
                        <button id="stickerBtn" class="tool-btn"><i class="fas fa-sticky-note"></i></button>
                        <input type="text" id="messageInput" placeholder="Сообщение...">
                        <button id="sendBtn" class="tool-btn" style="color:var(--ledurg-primary)"><i class="fas fa-paper-plane"></i></button>
                    </div>
                    <div id="replyPreview" style="display:none; background:var(--ledurg-input); border-radius:12px; padding:4px 8px; font-size:0.8rem; margin-top:8px;"></div>
                </div>
            </div>
        </div>
        <div id="createChannelFab" class="fab" title="Создать канал"><i class="fas fa-plus"></i></div>
    </div>
</div>

<!-- Модалки -->
<div id="channelModal" class="modal"><div class="modal-content"><h3>Новый канал</h3><input type="text" id="channelName" placeholder="Название"><textarea id="channelDesc" placeholder="Описание"></textarea><button id="confirmCreateChannel">Создать</button><button id="closeModal" style="margin-top:8px;">Отмена</button></div></div>
<div id="settingsModal" class="modal"><div class="modal-content"><h3>Настройки LEDERG</h3><button id="themeToggleBtn">🌓 Светлая/Тёмная</button><button id="bgStyleBtn" style="margin-top:8px;">🎨 Стиль фона (6 вариантов)</button><button id="changeNickBtn" style="margin-top:8px;">✏️ Сменить ник</button><button id="changePasswordBtn" style="margin-top:8px;">🔑 Сменить пароль</button><button id="clearChatHistoryBtn" style="margin-top:8px;">🗑️ Очистить историю</button><button id="closeSettings" style="margin-top:16px;">Закрыть</button></div></div>
<div id="searchMessagesModal" class="modal"><div class="modal-content"><h3>Поиск сообщений</h3><input type="text" id="searchMessagesInput" placeholder="Слово..."><div id="searchMessagesResults" style="max-height:200px; overflow-y:auto; margin-top:12px;"></div><button id="closeSearchModal">Закрыть</button></div></div>
<div id="voiceModal" class="modal"><div class="modal-content"><h3>Голосовое сообщение</h3><button id="startRecordBtn">🎤 Начать запись</button><button id="stopRecordBtn" disabled>⏹️ Остановить</button><audio id="audioPlayback" controls style="width:100%; margin-top:12px;"></audio><button id="sendAudioBtn" disabled>📤 Отправить</button><button id="closeVoiceModal" style="margin-top:8px;">Отмена</button></div></div>
<div id="statsModal" class="modal"><div class="modal-content"><h3>Статистика чата</h3><div id="statsContent"></div><button id="closeStatsModal">Закрыть</button></div></div>
<div id="stickerModal" class="modal"><div class="modal-content"><h3>Стикеры LEDERG</h3><div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center; font-size:2rem;"><span class="sticker" data-sticker="🚀">🚀</span><span class="sticker" data-sticker="💎">💎</span><span class="sticker" data-sticker="🔥">🔥</span><span class="sticker" data-sticker="⭐">⭐</span><span class="sticker" data-sticker="🎉">🎉</span></div><button id="closeStickerModal">Закрыть</button></div></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBMovcf0WC7bHYzeIKo7N5FYgvJOlSmiec",
        authDomain: "lederg-messages.firebaseapp.com",
        databaseURL: "https://lederg-messages-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "lederg-messages",
        storageBucket: "lederg-messages.firebasestorage.app",
        messagingSenderId: "753662822873",
        appId: "1:753662822873:web:0635ccd83a5f061546f1c8",
        measurementId: "G-SG186R72QV"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let currentUser = null, currentChat = null, currentMessagesListener = null, allUsers = {}, allChannels = {}, userChats = [], activeTab = 'chats';
    let typingTimeout = null, replyToMsg = null, editingMessage = null, mediaRecorder = null, audioChunks = [];
    let notificationsEnabled = true;

    // Helper
    function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m=> m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }
    function formatTime(ts) { return new Date(ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }

    async function loadAllUsers() { const snap = await db.ref('users').once('value'); allUsers = snap.val() || {}; }
    async function loadAllChannels() { const snap = await db.ref('channels').once('value'); allChannels = snap.val() || {}; }

    async function loadUserChats() {
        const convSnap = await db.ref('conversations').once('value');
        const convs = convSnap.val() || {};
        const myId = currentUser.uid;
        let privateChats = [];
        for(let [convId, conv] of Object.entries(convs)) {
            if(conv.participants?.includes(myId)) {
                const otherId = conv.participants.find(id=>id!==myId);
                const otherUser = allUsers[otherId];
                if(otherUser) privateChats.push({ id:convId, type:'private', name:otherUser.nickname, otherId, lastMessage:conv.lastMessage||'', lastUpdated:conv.lastUpdated||0, avatar:otherUser.nickname.charAt(0).toUpperCase() });
            }
        }
        const memberSnap = await db.ref('channel_members').once('value');
        const members = memberSnap.val() || {};
        let channelChats = [];
        for(let [channelId, subs] of Object.entries(members)) {
            if(subs && subs[myId]) {
                const chan = allChannels[channelId];
                if(chan) {
                    let lastMsg = '', lastTime=0;
                    const msgSnap = await db.ref(`channel_messages/${channelId}`).orderByKey().limitToLast(1).once('value');
                    if(msgSnap.exists()) { const vals=Object.values(msgSnap.val()); if(vals.length) { lastMsg=vals[0].text; lastTime=vals[0].timestamp||0; } }
                    channelChats.push({ id:channelId, type:'channel', name:chan.name, lastMessage:lastMsg, lastUpdated:lastTime, avatar:chan.name.charAt(0).toUpperCase() });
                }
            }
        }
        userChats = [...privateChats, ...channelChats].sort((a,b)=>(b.lastUpdated||0)-(a.lastUpdated||0));
        renderChatsList();
    }

    function renderChatsList() {
        let filtered = userChats.filter(c => activeTab==='channels' ? c.type==='channel' : c.type==='private');
        const chatsListDiv = document.getElementById('chatsList');
        chatsListDiv.innerHTML = '';
        if(!filtered.length) { chatsListDiv.innerHTML = '<div style="padding:20px;text-align:center;color:var(--ledurg-text-secondary);">Нет чатов</div>'; return; }
        for(let chat of filtered) {
            const div = document.createElement('div'); div.className = 'chat-item';
            if(currentChat?.id===chat.id && currentChat?.type===chat.type) div.classList.add('active');
            const avatarDiv = document.createElement('div'); avatarDiv.className = 'avatar'; avatarDiv.innerText = chat.avatar;
            const info = document.createElement('div'); info.className = 'chat-info';
            info.innerHTML = `<div class="chat-name">${escapeHtml(chat.name)}</div><div class="chat-last">${escapeHtml(chat.lastMessage||'Нет сообщений')}</div>`;
            div.appendChild(avatarDiv); div.appendChild(info);
            div.onclick = () => openChat(chat);
            chatsListDiv.appendChild(div);
        }
    }
