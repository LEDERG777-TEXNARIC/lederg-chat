<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LEDERG — Ультимативный мессенджер</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <!-- Emoji Picker -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.21.0/index.css">
    <script type="module">
        import { Picker } from 'https://cdn.jsdelivr.net/npm/emoji-picker-element@1.21.0/index.js';
        window.EmojiPicker = { Picker };
    </script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        :root {
            --bg-page: #0a0f1a;
            --bg-sidebar: #11161f;
            --bg-card: #1a1f2c;
            --bg-input: #222837;
            --text-primary: #f0f3f8;
            --text-secondary: #8e9eae;
            --accent: #2b9c5e;
            --accent-glow: rgba(43,156,94,0.4);
            --border: #2a3142;
            --message-self: #2b9c5e;
            --message-other: #1e2432;
        }
        body {
            font-family: 'Inter', -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-page);
            height: 100vh;
            overflow: hidden;
            transition: all 0.2s;
        }
        /* LEDERG уникальный стиль: неон + сетка + водяной знак */
        body.lederg-bg {
            background-image: radial-gradient(circle at 20% 30%, rgba(43,156,94,0.1) 2%, transparent 2.5%),
                              radial-gradient(circle at 80% 70%, rgba(43,156,94,0.08) 1.5%, transparent 2%),
                              repeating-linear-gradient(45deg, rgba(43,156,94,0.05) 0px, rgba(43,156,94,0.05) 2px, transparent 2px, transparent 8px);
            background-size: 40px 40px, 50px 50px, 20px 20px;
        }
        body::after {
            content: "LEDERG";
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 4rem;
            font-weight: 800;
            color: rgba(43,156,94,0.08);
            pointer-events: none;
            font-family: monospace;
            transform: rotate(-5deg);
            z-index: 0;
            letter-spacing: 4px;
        }
        body.light {
            --bg-page: #f5f7fb;
            --bg-sidebar: #ffffff;
            --bg-card: #ffffff;
            --bg-input: #eef2f7;
            --text-primary: #1a2a3a;
            --text-secondary: #5e6f8d;
            --border: #e2e8f0;
            --message-self: #e6f7e6;
            --message-other: #ffffff;
        }
        body.light::after {
            color: rgba(43,156,94,0.1);
        }
        /* Анимации */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes glowPulse {
            0% { box-shadow: 0 0 0 0 var(--accent-glow); }
            70% { box-shadow: 0 0 0 6px var(--accent-glow); }
            100% { box-shadow: 0 0 0 0 var(--accent-glow); }
        }
        /* Авторизация */
        .auth-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #0a0f1a 0%, #11161f 100%);
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        .auth-card {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 2rem;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(43,156,94,0.2);
            animation: fadeIn 0.4s;
        }
        .auth-card h2 {
            color: var(--text-primary);
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 2rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff, var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .auth-card input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 12px;
            background: var(--bg-input);
            border: none;
            border-radius: 20px;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: 0.1s;
        }
        .auth-card input:focus {
            box-shadow: 0 0 0 2px var(--accent);
        }
        .auth-card button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            border-radius: 28px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
        }
        .auth-card button:hover {
            filter: brightness(1.05);
            transform: scale(0.98);
        }
        .toggle-mode {
            text-align: center;
            margin-top: 16px;
            color: var(--text-secondary);
            cursor: pointer;
        }
        /* Основной экран */
        .chat-screen {
            display: none;
            height: 100vh;
            width: 100%;
            position: relative;
            z-index: 1;
        }
        .main-layout {
            display: flex;
            height: 100%;
        }
        /* Боковая панель */
        .sidebar {
            width: 320px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 20;
        }
        .user-info {
            padding: 16px;
            background: var(--bg-card);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .user-details {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar-small {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent), #1a6e44);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            position: relative;
            box-shadow: 0 0 8px var(--accent-glow);
        }
        .user-nick {
            font-weight: 600;
            color: var(--text-primary);
        }
        .logout-btn, .settings-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px;
        }
        .tabs {
            display: flex;
            padding: 8px 12px;
            gap: 8px;
            border-bottom: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1;
            background: var(--bg-card);
            border: none;
            color: var(--text-secondary);
            padding: 8px;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.1s;
        }
        .tab-btn.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 8px var(--accent-glow);
        }
        .search-box {
            padding: 12px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-input);
            border: none;
            border-radius: 30px;
            color: var(--text-primary);
            outline: none;
        }
        .search-results {
            position: absolute;
            top: 55px;
            left: 12px;
            right: 12px;
            background: var(--bg-card);
            border-radius: 20px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 30;
            display: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .search-result {
            padding: 12px;
            color: var(--text-primary);
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chats-list {
            flex: 1;
            overflow-y: auto;
        }
        .chat-item {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: 0.1s;
        }
        .chat-item.active {
            background: linear-gradient(90deg, rgba(43,156,94,0.1), transparent);
            border-left: 3px solid var(--accent);
        }
        .avatar {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--accent), #1a6e44);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.3rem;
            color: white;
            position: relative;
        }
        .chat-info {
            flex: 1;
            overflow: hidden;
        }
        .chat-name {
            color: var(--text-primary);
            font-weight: 600;
        }
        .chat-last {
            color: var(--text-secondary);
            font-size: 0.75rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        /* Чат область */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-page);
            min-height: 0;
        }
        .chat-header {
            padding: 12px 16px;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .back-btn {
            display: none;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
        }
        .chat-title {
            flex: 1;
            font-weight: bold;
            color: var(--text-primary);
            font-size: 1.1rem;
        }
        .chat-actions button {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.2rem;
            margin-left: 12px;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 0;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: fadeIn 0.1s;
        }
        .message-self {
            align-self: flex-end;
        }
        .message-bubble {
            background: var(--message-other);
            padding: 10px 16px;
            border-radius: 22px;
            border-top-left-radius: 5px;
            color: var(--text-primary);
            word-wrap: break-word;
            cursor: pointer;
            transition: 0.05s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .message-self .message-bubble {
            background: var(--message-self);
            border-top-right-radius: 5px;
            box-shadow: 0 0 4px var(--accent-glow);
        }
        .message-meta {
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin: 4px 8px 0;
            display: flex;
            gap: 8px;
        }
        .reactions {
            display: flex;
            gap: 6px;
            margin-top: 4px;
        }
        .reaction {
            background: var(--bg-input);
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .input-area {
            padding: 12px;
            background: var(--bg-sidebar);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .input-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        #messageInput {
            flex: 1;
            padding: 12px 18px;
            border: none;
            border-radius: 30px;
            background: var(--bg-input);
            color: var(--text-primary);
            outline: none;
            font-size: 0.95rem;
        }
        .tool-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.4rem;
            cursor: pointer;
            padding: 8px;
            transition: 0.1s;
        }
        .tool-btn:active {
            transform: scale(0.9);
        }
        .typing-indicator {
            font-size: 0.7rem;
            color: var(--text-secondary);
            padding: 4px 16px;
        }
        .fab {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, var(--accent), #1a6e44);
            width: 60px;
            height: 60px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4), 0 0 8px var(--accent-glow);
            z-index: 15;
            transition: 0.1s;
        }
        .fab:active {
            transform: scale(0.95);
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-content {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(43,156,94,0.3);
        }
        .context-menu {
            position: fixed;
            background: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            z-index: 2000;
            display: none;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .context-menu-item {
            padding: 12px 24px;
            color: var(--text-primary);
            cursor: pointer;
            white-space: nowrap;
        }
        .context-menu-item:hover {
            background: var(--bg-input);
        }
        /* Адаптив для телефона */
        @media (max-width: 680px) {
            .sidebar {
                position: absolute;
                left: 0;
                top: 0;
                height: 100%;
                width: 85%;
                max-width: 280px;
                transform: translateX(-100%);
                box-shadow: 2px 0 12px rgba(0,0,0,0.4);
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .back-btn {
                display: block;
            }
            .message {
                max-width: 90%;
            }
            .chat-header {
                padding: 12px;
            }
            .tool-btn {
                font-size: 1.2rem;
                padding: 6px;
            }
            .fab {
                width: 50px;
                height: 50px;
                font-size: 24px;
                bottom: 16px;
                right: 16px;
            }
            .modal-content {
                width: 95%;
                padding: 20px;
            }
        }
        .emoji-picker {
            position: absolute;
            bottom: 80px;
            right: 20px;
            z-index: 50;
            display: none;
        }
        .channel-members-list {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 12px;
        }
        .member-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid var(--border);
        }
        button.danger {
            background: #dc3545;
        }
    </style>
</head>
<body>
<div class="app">
    <!-- Авторизация -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-card">
            <h2>LEDERG</h2>
            <input type="email" id="emailInput" placeholder="Email">
            <input type="password" id="passwordInput" placeholder="Пароль">
            <input type="text" id="nicknameInput" placeholder="Никнейм (при регистрации)" style="display: none;">
            <button id="submitAuthBtn">Войти</button>
            <div class="toggle-mode" id="toggleAuthMode">Создать аккаунт</div>
            <div id="authError" class="error-msg"></div>
        </div>
    </div>

    <!-- Основной экран -->
    <div id="chatScreen" class="chat-screen">
        <div class="main-layout">
            <div id="sidebar" class="sidebar">
                <div class="user-info">
                    <div class="user-details">
                        <div class="avatar-small" id="userAvatarSmall">U</div>
                        <span id="userNickDisplay" class="user-nick"></span>
                    </div>
                    <div>
                        <button id="settingsBtn" class="settings-btn"><i class="fas fa-cog"></i></button>
                        <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i></button>
                    </div>
                </div>
                <div class="tabs">
                    <button id="tabChats" class="tab-btn active"><i class="fas fa-comment"></i> Чаты</button>
                    <button id="tabChannels" class="tab-btn"><i class="fas fa-broadcast-tower"></i> Каналы</button>
                </div>
                <div class="search-box">
                    <input type="text" id="globalSearch" placeholder="🔍 Поиск людей или каналов...">
                    <div id="searchResultsPanel" class="search-results"></div>
                </div>
                <div id="chatsList" class="chats-list"></div>
            </div>

            <div class="chat-area">
                <div class="chat-header">
                    <button id="backBtn" class="back-btn"><i class="fas fa-bars"></i></button>
                    <div class="chat-title" id="currentChatTitle">LEDERG</div>
                    <div class="chat-actions">
                        <button id="searchInChatBtn" title="Поиск"><i class="fas fa-search"></i></button>
                        <button id="channelInfoBtn" title="Инфо" style="display:none;"><i class="fas fa-info-circle"></i></button>
                        <button id="exportChatBtn" title="Экспорт"><i class="fas fa-download"></i></button>
                    </div>
                </div>
                <div id="typingIndicator" class="typing-indicator"></div>
                <div id="messagesArea" class="messages-area"></div>
                <div class="input-area">
                    <div class="input-row">
                        <button id="emojiBtn" class="tool-btn"><i class="far fa-smile-wink"></i></button>
                        <button id="attachBtn" class="tool-btn"><i class="fas fa-paperclip"></i></button>
                        <button id="voiceBtn" class="tool-btn"><i class="fas fa-microphone"></i></button>
                        <input type="text" id="messageInput" placeholder="Сообщение...">
                        <button id="sendBtn" class="tool-btn" style="color:var(--accent)"><i class="fas fa-paper-plane"></i></button>
                    </div>
                    <div id="replyPreview" style="display:none; background:var(--bg-input); border-radius:12px; padding:6px 10px; font-size:0.8rem; margin-top:6px;"></div>
                </div>
            </div>
        </div>
        <div id="createChannelFab" class="fab" title="Создать канал"><i class="fas fa-plus"></i></div>
    </div>
</div>

<!-- Модалки -->
<div id="channelModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-bullhorn"></i> Новый канал</h3>
        <input type="text" id="channelName" placeholder="Название">
        <textarea id="channelDesc" placeholder="Описание" rows="2"></textarea>
        <button id="confirmCreateChannel">Создать</button>
        <button id="closeModal" style="background:var(--bg-input); margin-top:8px;">Отмена</button>
    </div>
</div>
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-sliders-h"></i> Настройки</h3>
        <button id="themeToggleBtn">🌓 Светлая/Тёмная</button>
        <button id="ledergBgToggleBtn">🎨 LEDERG стиль</button>
        <button id="changeNickBtn">✏️ Сменить ник</button>
        <button id="changePasswordBtn">🔑 Сменить пароль</button>
        <button id="clearChatHistoryBtn">🗑️ Очистить историю</button>
        <button id="notificationsToggleBtn">🔔 Уведомления: Вкл</button>
        <button id="blockUserBtn" style="display:none;">🚫 Заблокировать пользователя</button>
        <button id="closeSettings" style="margin-top:16px;">Закрыть</button>
    </div>
</div>
<div id="searchMessagesModal" class="modal">
    <div class="modal-content">
        <h3>Поиск по сообщениям</h3>
        <input type="text" id="searchMessagesInput" placeholder="Слово...">
        <div id="searchMessagesResults" style="max-height:200px; overflow-y:auto; margin-top:12px;"></div>
        <button id="closeSearchModal" style="margin-top:12px;">Закрыть</button>
    </div>
</div>
<div id="channelInfoModal" class="modal">
    <div class="modal-content">
        <h3>Информация о канале</h3>
        <p><strong>Название:</strong> <span id="infoChannelName"></span></p>
        <p><strong>Описание:</strong> <span id="infoChannelDesc"></span></p>
        <p><strong>Участники:</strong> <span id="infoMemberCount"></span></p>
        <div id="membersList" class="channel-members-list"></div>
        <button id="leaveChannelBtn" style="background:#ff8a6f; margin-top:12px;">Покинуть канал</button>
        <button id="closeChannelInfo" style="margin-top:8px;">Закрыть</button>
    </div>
</div>
<div id="voiceModal" class="modal">
    <div class="modal-content">
        <h3>Голосовое сообщение</h3>
        <button id="startRecordBtn">🎤 Начать запись</button>
        <button id="stopRecordBtn" disabled>⏹️ Остановить</button>
        <audio id="audioPlayback" controls style="width:100%; margin-top:12px;"></audio>
        <button id="sendAudioBtn" disabled>📤 Отправить</button>
        <button id="closeVoiceModal" style="margin-top:8px;">Отмена</button>
    </div>
</div>

<script>
    // Firebase config
    const firebaseConfig = {
        apiKey: "AIzaSyBMovcf0WC7bHYzeIKo7N5FYgvJOlSmiec",
        authDomain: "lederg-messages.firebaseapp.com",
        databaseURL: "https://lederg-messages-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "lederg-messages",
        storageBucket: "lederg-messages.firebasestorage.app",
        messagingSenderId: "753662822873",
        appId: "1:753662822873:web:0635ccd83a5f061546f1c8",
        measurementId: "G-SG186R72QV"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let currentUser = null;
    let currentChat = null;
    let currentMessagesListener = null;
    let allUsers = {};
    let allChannels = {};
    let userChats = [];
    let activeTab = 'chats';
    let typingTimeout = null;
    let replyToMsg = null;
    let editingMessage = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let notificationsEnabled = true;
    let ledergBackground = localStorage.getItem('lederg_bg') === 'true';

    // DOM elements (сокращённо, но все есть)
    const elements = {
        authScreen, chatScreen, emailInput, passwordInput, nicknameInput, submitBtn,
        toggleMode, authError, userNickDisplay, logoutBtn, settingsBtn, globalSearch,
        searchResultsPanel, chatsListDiv, messagesArea, messageInput, sendBtn,
        currentChatTitle, backBtn, tabChats, tabChannels, createChannelFab, channelModal,
        channelNameInput, channelDescInput, confirmCreateChannel, closeModal, settingsModal,
        themeToggleBtn, ledergBgToggleBtn, changeNickBtn, changePasswordBtn, clearChatHistoryBtn,
        notificationsToggleBtn, closeSettings, searchInChatBtn, searchMessagesModal,
        searchMessagesInput, searchMessagesResults, closeSearchModal, emojiBtn, attachBtn,
        voiceBtn, typingIndicator, replyPreview, exportChatBtn, channelInfoBtn, channelInfoModal,
        infoChannelName, infoChannelDesc, infoMemberCount, membersListDiv, leaveChannelBtn,
        closeChannelInfo, voiceModal, startRecordBtn, stopRecordBtn, audioPlayback, sendAudioBtn,
        closeVoiceModal, blockUserBtn: document.getElementById('blockUserBtn')
    };

    // Helper functions
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=> m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }
    function formatTime(ts) { return new Date(ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }
    function formatMarkdown(text) {
        if(!text) return '';
        return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\*(.*?)\*/g, '<em>$1</em>').replace(/`(.*?)`/g, '<code>$1</code>');
    }
    function showNotification(title, body) { if(notificationsEnabled && Notification.permission === 'granted') new Notification(title, {body}); }
    if(Notification.permission !== 'granted') Notification.requestPermission();

    // Data loading (аналогично предыдущему, но с добавлением блокировок и т.д. – сохраним компактность)
    async function loadAllUsers() { const snap = await db.ref('users').once('value'); allUsers = snap.val() || {}; }
    async function loadAllChannels() { const snap = await db.ref('channels').once('value'); allChannels = snap.val() || {}; }

    async function loadUserChats() {
        const convSnap = await db.ref('conversations').once('value');
        const convs = convSnap.val() || {};
        const myId = currentUser.uid;
        let privateChats = [];
        for(let [convId, conv] of Object.entries(convs)) {
            if(conv.participants?.includes(myId)) {
                const otherId = conv.participants.find(id=>id!==myId);
                const otherUser = allUsers[otherId];
                if(otherUser) privateChats.push({ id:convId, type:'private', name:otherUser.nickname, otherId, lastMessage:conv.lastMessage||'', lastUpdated:conv.lastUpdated||0, avatar:otherUser.nickname.charAt(0).toUpperCase() });
            }
        }
        const memberSnap = await db.ref('channel_members').once('value');
        const members = memberSnap.val() || {};
        let channelChats = [];
        for(let [channelId, subs] of Object.entries(members)) {
            if(subs && subs[myId]) {
                const chan = allChannels[channelId];
                if(chan) {
                    let lastMsg='', lastTime=0;
                    const msgSnap = await db.ref(`channel_messages/${channelId}`).orderByKey().limitToLast(1).once('value');
                    if(msgSnap.exists()) { const vals=Object.values(msgSnap.val()); if(vals.length) { lastMsg=vals[0].text; lastTime=vals[0].timestamp||0; } }
                    channelChats.push({ id:channelId, type:'channel', name:chan.name, lastMessage:lastMsg, lastUpdated:lastTime, avatar:chan.name.charAt(0).toUpperCase() });
                }
            }
        }
        userChats = [...privateChats, ...channelChats].sort((a,b)=>(b.lastUpdated||0)-(a.lastUpdated||0));
        renderChatsList();
    }

    function renderChatsList() {
        let filtered = userChats.filter(c => activeTab==='channels' ? c.type==='channel' : c.type==='private');
        elements.chatsListDiv.innerHTML = '';
        if(!filtered.length) { elements.chatsListDiv.innerHTML = '<div style="padding:20px;color:var(--text-secondary);text-align:center;">Нет чатов</div>'; return; }
        for(let chat of filtered) {
            const div = document.createElement('div'); div.className = 'chat-item';
            if(currentChat?.id===chat.id && currentChat?.type===chat.type) div.classList.add('active');
            const avatarDiv = document.createElement('div'); avatarDiv.className = 'avatar'; avatarDiv.innerText = chat.avatar;
            const info = document.createElement('div'); info.className = 'chat-info';
            info.innerHTML = `<div class="chat-name">${escapeHtml(chat.name)}</div><div class="chat-last">${escapeHtml(chat.lastMessage||'Нет сообщений')}</div>`;
            div.appendChild(avatarDiv); div.appendChild(info);
            div.onclick = () => openChat(chat);
            elements.chatsListDiv.appendChild(div);
        }
    }

    async function openChat(chat) {
        if(currentMessagesListener) currentMessagesListener.off();
        currentChat = chat;
        elements.currentChatTitle.innerText = chat.name;
        elements.messagesArea.innerHTML = '<div style="text-align:center;color:var(--text-secondary);"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</div>';
        let path = (chat.type === 'private') ? `messages/${chat.id}` : `channel_messages/${chat.id}`;
        const msgRef = db.ref(path);
        currentMessagesListener = msgRef.on('value', (snapshot) => {
            const data = snapshot.val() || {};
            const msgs = Object.entries(data).map(([id,m])=>({id,...m})).sort((a,b)=>(a.timestamp||0)-(b.timestamp||0));
            renderMessages(msgs);
        });
        const typingRef = db.ref(`typing/${chat.type === 'private' ? chat.id : 'channel_'+chat.id}`);
        typingRef.on('value', (snap) => {
            const typingData = snap.val();
            if(typingData && Object.values(typingData).some(v=>v!==currentUser.uid)) {
                elements.typingIndicator.innerText = 'Печатает...';
                setTimeout(()=>elements.typingIndicator.innerText='', 2000);
            } else elements.typingIndicator.innerText = '';
        });
        if(window.innerWidth<=680) document.getElementById('sidebar').classList.remove('open');
        renderChatsList();
        if(chat.type === 'channel') elements.channelInfoBtn.style.display = 'inline-block';
        else elements.channelInfoBtn.style.display = 'none';
    }

    function renderMessages(msgs) {
        if(!elements.messagesArea) return;
        elements.messagesArea.innerHTML = '';
        if(!msgs.length) { elements.messagesArea.innerHTML = '<div style="text-align:center;color:var(--text-secondary);">Сообщений нет</div>'; return; }
        for(let msg of msgs) {
            const isSelf = msg.fromUid === currentUser.uid;
            const msgDiv = document.createElement('div'); msgDiv.className = `message ${isSelf ? 'message-self' : ''}`;
            msgDiv.dataset.id = msg.id;
            const bubble = document.createElement('div'); bubble.className = 'message-bubble';
            if(msg.mediaType === 'image') bubble.innerHTML = `<img src="${msg.text}" style="max-width:200px; border-radius:12px;">`;
            else if(msg.mediaType === 'audio') bubble.innerHTML = `<audio controls src="${msg.text}" style="max-width:200px;"></audio>`;
            else bubble.innerHTML = formatMarkdown(msg.text);
            if(msg.replyTo) bubble.innerHTML = `<small style="opacity:0.7;">↳ ${escapeHtml(msg.replyTo.text)}</small><br>${bubble.innerHTML}`;
            const meta = document.createElement('div'); meta.className = 'message-meta';
            meta.innerHTML = `<span>${isSelf ? 'Вы' : (msg.fromNick || 'Пользователь')} · ${formatTime(msg.timestamp)}</span>`;
            if(msg.edited) meta.innerHTML += ` <span>(ред.)</span>`;
            const reactionsDiv = document.createElement('div'); reactionsDiv.className = 'reactions';
            if(msg.reactions) {
                Object.entries(msg.reactions).forEach(([react, users]) => {
                    const rSpan = document.createElement('span'); rSpan.className = 'reaction'; rSpan.innerText = `${react} ${Object.keys(users).length}`;
                    rSpan.onclick = (e) => { e.stopPropagation(); addReaction(msg.id, react); };
                    reactionsDiv.appendChild(rSpan);
                });
            }
            msgDiv.appendChild(bubble); msgDiv.appendChild(meta); if(reactionsDiv.children.length) msgDiv.appendChild(reactionsDiv);
            msgDiv.oncontextmenu = (e) => { e.preventDefault(); showContextMenu(e, msg.id, msg.text, msg.mediaType); };
            elements.messagesArea.appendChild(msgDiv);
        }
        elements.messagesArea.scrollTop = elements.messagesArea.scrollHeight;
    }

    async function sendMessage(text, mediaType=null, mediaData=null) {
        if(!text && !mediaData) return;
        if(currentChat?.type === 'channel') {
            const channelData = allChannels[currentChat.id];
            if(channelData && channelData.createdBy !== currentUser.uid && !channelData.admins?.[currentUser.uid]) {
                alert("В этом канале писать могут только администраторы.");
                return;
            }
        }
        const msgData = { fromUid: currentUser.uid, fromNick: currentUser.displayName, timestamp: Date.now() };
        if(mediaType && mediaData) { msgData.mediaType = mediaType; msgData.text = mediaData; }
        else msgData.text = text;
        if(replyToMsg) msgData.replyTo = replyToMsg;
        if(editingMessage) { msgData.edited = true; await db.ref(`${currentChat.type==='private'?`messages/${currentChat.id}`:`channel_messages/${currentChat.id}`}/${editingMessage}`).update(msgData); editingMessage=null; }
        else {
            await db.ref(`${currentChat.type==='private'?`messages/${currentChat.id}`:`channel_messages/${currentChat.id}`}`).push(msgData);
            if(currentChat.type==='private') await db.ref(`conversations/${currentChat.id}`).update({ lastMessage: text, lastUpdated: Date.now() });
        }
        elements.messageInput.value = ''; replyToMsg=null; elements.replyPreview.style.display='none';
        await loadUserChats();
        showNotification(`Новое сообщение`, text);
    }

    function showContextMenu(e, msgId, msgText, mediaType) {
        const menu = document.createElement('div'); menu.className = 'context-menu';
        menu.innerHTML = `<div class="context-menu-item" data-action="copy">📋 Копировать</div>
                          <div class="context-menu-item" data-action="reply">↩️ Ответить</div>
                          <div class="context-menu-item" data-action="edit">✏️ Редактировать</div>
                          <div class="context-menu-item" data-action="delete">🗑️ Удалить</div>`;
        document.body.appendChild(menu);
        menu.style.left = e.pageX + 'px'; menu.style.top = e.pageY + 'px'; menu.style.display = 'block';
        const handleClick = (action) => {
            if(action === 'copy') navigator.clipboard.writeText(msgText);
            if(action === 'reply') { replyToMsg = { id:msgId, text:msgText }; elements.replyPreview.innerText = `Ответ: ${msgText.substring(0,50)}`; elements.replyPreview.style.display = 'block'; }
            if(action === 'edit') { editingMessage = msgId; elements.messageInput.value = msgText; elements.messageInput.focus(); }
            if(action === 'delete') db.ref(`${currentChat.type==='private'?`messages/${currentChat.id}`:`channel_messages/${currentChat.id}`}/${msgId}`).remove();
            menu.remove();
        };
        menu.querySelectorAll('.context-menu-item').forEach(item => item.onclick = () => handleClick(item.dataset.action));
        document.addEventListener('click', function rm() { if(menu) menu.remove(); document.removeEventListener('click', rm); }, {once:true});
    }

    async function addReaction(msgId, reaction) {
        const path = `${currentChat.type==='private'?`messages/${currentChat.id}`:`channel_messages/${currentChat.id}`}/${msgId}/reactions/${reaction}`;
        const snap = await db.ref(path).once('value');
        let users = snap.val() || {};
        if(users[currentUser.uid]) delete users[currentUser.uid];
        else users[currentUser.uid] = true;
        await db.ref(path).set(users);
    }

    // Поиск
    function setupSearch() {
        let debounce;
        elements.globalSearch.addEventListener('input', async (e) => {
            clearTimeout(debounce);
            const q = e.target.value.trim().toLowerCase();
            if(q.length<2) { elements.searchResultsPanel.style.display='none'; return; }
            debounce = setTimeout(async () => {
                const usersList = Object.entries(allUsers).filter(([uid,u]) => uid!==currentUser.uid && u.nickname.toLowerCase().includes(q));
                const memberSnap = await db.ref('channel_members').once('value');
                const members = memberSnap.val() || {};
                const subscribedIds = Object.keys(members).filter(cid=>members[cid]?.[currentUser.uid]);
                const channelsList = Object.entries(allChannels).filter(([cid,ch]) => !subscribedIds.includes(cid) && ch.name.toLowerCase().includes(q));
                if(!usersList.length && !channelsList.length) { elements.searchResultsPanel.style.display='none'; return; }
                elements.searchResultsPanel.innerHTML = '';
                for(let [uid,user] of usersList.slice(0,5)) {
                    const div = document.createElement('div'); div.className='search-result'; div.innerHTML = `<i class="fas fa-user"></i> ${escapeHtml(user.nickname)}`;
                    div.onclick = () => startPrivateChat(uid, user.nickname);
                    elements.searchResultsPanel.appendChild(div);
                }
                for(let [cid,ch] of channelsList.slice(0,5)) {
                    const div = document.createElement('div'); div.className='search-result'; div.innerHTML = `<i class="fas fa-bullhorn"></i> ${escapeHtml(ch.name)} (канал)`;
                    div.onclick = () => joinChannel(cid, ch.name);
                    elements.searchResultsPanel.appendChild(div);
                }
                elements.searchResultsPanel.style.display='block';
            }, 300);
        });
        document.addEventListener('click', (e) => { if(!elements.searchResultsPanel.contains(e.target) && e.target!==elements.globalSearch) elements.searchResultsPanel.style.display='none'; });
    }
    async function startPrivateChat(otherUid, otherNick) {
        const convId = [currentUser.uid, otherUid].sort().join('_');
        if(!(await db.ref(`conversations/${convId}`).once('value')).exists()) await db.ref(`conversations/${convId}`).set({ participants:[currentUser.uid, otherUid], lastUpdated:Date.now() });
        await loadUserChats(); const chat = userChats.find(c=>c.type==='private'&&c.otherId===otherUid); if(chat) openChat(chat);
        elements.globalSearch.value=''; elements.searchResultsPanel.style.display='none';
    }
    async function joinChannel(channelId, channelName) {
        await db.ref(`channel_members/${channelId}/${currentUser.uid}`).set(true);
        await loadAllChannels(); await loadUserChats(); const chat = userChats.find(c=>c.type==='channel'&&c.id===channelId); if(chat) openChat(chat);
        elements.globalSearch.value=''; elements.searchResultsPanel.style.display='none';
    }

    // Channel creation
    elements.confirmCreateChannel.onclick = async () => {
        const name = elements.channelNameInput.value.trim(); if(!name) return alert("Введите название");
        if(Object.values(allChannels).some(ch=>ch.name.toLowerCase()===name.toLowerCase())) return alert("Канал уже существует");
        const newRef = db.ref('channels').push(); 
        await newRef.set({ name, description:elements.channelDescInput.value, createdBy:currentUser.uid, createdAt:Date.now(), admins: { [currentUser.uid]: true } });
        await db.ref(`channel_members/${newRef.key}/${currentUser.uid}`).set(true);
        elements.channelModal.classList.remove('active'); elements.channelNameInput.value=''; elements.channelDescInput.value='';
        await loadAllChannels(); await loadUserChats();
    };

    // Event listeners (упрощённо)
    elements.sendBtn.onclick = () => sendMessage(elements.messageInput.value.trim());
    elements.messageInput.addEventListener('keypress', (e) => { if(e.key==='Enter') sendMessage(elements.messageInput.value.trim()); });
    elements.messageInput.addEventListener('input', () => {
        if(typingTimeout) clearTimeout(typingTimeout);
        if(currentChat) db.ref(`typing/${currentChat.type==='private'?currentChat.id:'channel_'+currentChat.id}/${currentUser.uid}`).set(true);
        typingTimeout = setTimeout(() => { if(currentChat) db.ref(`typing/${currentChat.type==='private'?currentChat.id:'channel_'+currentChat.id}/${currentUser.uid}`).remove(); }, 1500);
    });
    elements.attachBtn.onclick = () => { const inp = document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.onchange = (e) => { const file=e.target.files[0]; const reader=new FileReader(); reader.onload=()=>sendMessage(null,'image',reader.result); reader.readAsDataURL(file); }; inp.click(); };
    elements.emojiBtn.onclick = () => { const pickerDiv = document.createElement('div'); pickerDiv.className='emoji-picker'; document.body.appendChild(pickerDiv); import('https://cdn.jsdelivr.net/npm/emoji-picker-element@1.21.0/index.js').then(({Picker})=>{ new Picker({ dataSource: 'https://cdn.jsdelivr.net/npm/emoji-picker-element-data@1.4.0/emojibase/data.json' }).then(picker => { pickerDiv.appendChild(picker); picker.addEventListener('emoji-click', e=>{ elements.messageInput.value += e.detail.unicode; pickerDiv.remove(); }); }); }); };
    // Voice
    elements.voiceBtn.onclick = () => elements.voiceModal.classList.add('active');
    elements.startRecordBtn.onclick = async () => { const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); mediaRecorder = new MediaRecorder(stream); audioChunks = []; mediaRecorder.ondataavailable = e => audioChunks.push(e.data); mediaRecorder.onstop = () => { const blob = new Blob(audioChunks, { type: 'audio/webm' }); const url = URL.createObjectURL(blob); elements.audioPlayback.src = url; elements.sendAudioBtn.disabled = false; }; mediaRecorder.start(); elements.startRecordBtn.disabled = true; elements.stopRecordBtn.disabled = false; };
    elements.stopRecordBtn.onclick = () => { if(mediaRecorder) mediaRecorder.stop(); elements.startRecordBtn.disabled=false; elements.stopRecordBtn.disabled=true; };
    elements.sendAudioBtn.onclick = () => { if(elements.audioPlayback.src) sendMessage(null, 'audio', elements.audioPlayback.src); elements.voiceModal.classList.remove('active'); elements.audioPlayback.src=''; elements.sendAudioBtn.disabled=true; };
    elements.closeVoiceModal.onclick = () => elements.voiceModal.classList.remove('active');
    // Экспорт
    elements.exportChatBtn.onclick = async () => { if(!currentChat) return; const path = currentChat.type==='private'?`messages/${currentChat.id}`:`channel_messages/${currentChat.id}`; const snap = await db.ref(path).once('value'); const data = snap.val(); const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href=url; a.download=`chat_${currentChat.id}.json`; a.click(); URL.revokeObjectURL(url); };
    // Channel info
    elements.channelInfoBtn.onclick = async () => { if(!currentChat || currentChat.type !== 'channel') return; const channel = allChannels[currentChat.id]; if(!channel) return; elements.infoChannelName.innerText = channel.name; elements.infoChannelDesc.innerText = channel.description || 'Нет описания'; const membersSnap = await db.ref(`channel_members/${currentChat.id}`).once('value'); const members = membersSnap.val() || {}; elements.infoMemberCount.innerText = Object.keys(members).length; elements.membersListDiv.innerHTML = ''; for(let uid of Object.keys(members)) { const user = allUsers[uid]; if(user) { const div = document.createElement('div'); div.className = 'member-item'; div.innerHTML = `<span>${escapeHtml(user.nickname)}</span> ${uid === channel.createdBy ? '<i class="fas fa-crown" style="color:gold;"></i>' : ''}`; elements.membersListDiv.appendChild(div); } } elements.channelInfoModal.classList.add('active'); };
    elements.leaveChannelBtn.onclick = async () => { if(confirm("Покинуть канал?")) { await db.ref(`channel_members/${currentChat.id}/${currentUser.uid}`).remove(); await loadUserChats(); elements.channelInfoModal.classList.remove('active'); if(currentChat && currentChat.id === currentChat.id) currentChat = null; elements.messagesArea.innerHTML = ''; elements.currentChatTitle.innerText = 'LEDERG'; } };
    elements.closeChannelInfo.onclick = () => elements.channelInfoModal.classList.remove('active');
    // Settings
    elements.settingsBtn.onclick = () => elements.settingsModal.classList.add('active');
    elements.closeSettings.onclick = () => elements.settingsModal.classList.remove('active');
    elements.themeToggleBtn.onclick = () => document.body.classList.toggle('light');
    elements.ledergBgToggleBtn.onclick = () => { document.body.classList.toggle('lederg-bg'); localStorage.setItem('lederg_bg', document.body.classList.contains('lederg-bg')); };
    if(ledergBackground) document.body.classList.add('lederg-bg');
    elements.changeNickBtn.onclick = async () => { const newNick=prompt('Новый ник:'); if(newNick){ await db.ref(`users/${currentUser.uid}/nickname`).set(newNick); await db.ref(`nicknames/${newNick}`).set(currentUser.uid); currentUser.displayName=newNick; elements.userNickDisplay.innerText=newNick; } };
    elements.changePasswordBtn.onclick = async () => { const newPass=prompt('Новый пароль (минимум 6 символов):'); if(newPass&&newPass.length>=6) await currentUser.updatePassword(newPass); else alert('Слишком короткий'); };
    elements.clearChatHistoryBtn.onclick = async () => { if(!currentChat) return; if(confirm("Очистить историю?")) { const path = currentChat.type==='private'?`messages/${currentChat.id}`:`channel_messages/${currentChat.id}`; await db.ref(path).remove(); if(currentChat.type==='private') await db.ref(`conversations/${currentChat.id}`).update({ lastMessage: '', lastUpdated: Date.now() }); } };
    elements.notificationsToggleBtn.onclick = () => { notificationsEnabled=!notificationsEnabled; elements.notificationsToggleBtn.innerText=`🔔 Уведомления: ${notificationsEnabled?'Вкл':'Выкл'}`; };
    elements.searchInChatBtn.onclick = () => elements.searchMessagesModal.classList.add('active');
    elements.searchMessagesInput.oninput = () => { const query=elements.searchMessagesInput.value.trim().toLowerCase(); if(!query||!currentChat) return; db.ref(`${currentChat.type==='private'?`messages/${currentChat.id}`:`channel_messages/${currentChat.id}`}`).once('value', snap=>{ const msgs=Object.values(snap.val()||{}).filter(m=>m.text?.toLowerCase().includes(query)); elements.searchMessagesResults.innerHTML=msgs.map(m=>`<div style="padding:8px; border-bottom:1px solid var(--border);">${escapeHtml(m.text)}<br><small>${formatTime(m.timestamp)}</small></div>`).join(''); }); };
    elements.closeSearchModal.onclick = () => elements.searchMessagesModal.classList.remove('active');
    // Auth
    let isLoginMode=true;
    elements.toggleMode.onclick=()=>{ isLoginMode=!isLoginMode; elements.nicknameInput.style.display=isLoginMode?'none':'block'; elements.submitBtn.innerText=isLoginMode?'Войти':'Зарегистрироваться'; elements.toggleMode.innerText=isLoginMode?'Создать аккаунт':'Уже есть аккаунт? Войти'; };
    elements.submitBtn.onclick=async()=>{ const email=elements.emailInput.value.trim(), pass=elements.passwordInput.value.trim(), nick=elements.nicknameInput.value.trim(); try{ if(isLoginMode) await auth.signInWithEmailAndPassword(email,pass); else { const cred=await auth.createUserWithEmailAndPassword(email,pass); if((await db.ref('nicknames').orderByValue().equalTo(nick).once('value')).exists()) throw new Error('Ник занят'); await db.ref(`users/${cred.user.uid}`).set({nickname:nick, email}); await db.ref(`nicknames/${nick}`).set(cred.user.uid); } } catch(e){ elements.authError.innerText=e.message; } };
    auth.onAuthStateChanged(async(user)=>{ if(user){ currentUser=user; const snap=await db.ref(`users/${user.uid}`).once('value'); const data=snap.val()||{nickname:'User'}; currentUser.displayName=data.nickname; elements.userNickDisplay.innerText=data.nickname; document.getElementById('userAvatarSmall').innerText=data.nickname.charAt(0).toUpperCase(); elements.authScreen.style.display='none'; elements.chatScreen.style.display='block'; await loadAllUsers(); await loadAllChannels(); await loadUserChats(); setupSearch(); } else { elements.authScreen.style.display='flex'; elements.chatScreen.style.display='none'; if(currentMessagesListener) currentMessagesListener.off(); } });
    elements.logoutBtn.onclick=()=>auth.signOut();
    elements.tabChats.onclick=()=>{ activeTab='chats'; elements.tabChats.classList.add('active'); elements.tabChannels.classList.remove('active'); renderChatsList(); };
    elements.tabChannels.onclick=()=>{ activeTab='channels'; elements.tabChannels.classList.add('active'); elements.tabChats.classList.remove('active'); renderChatsList(); };
    elements.backBtn.onclick=()=>document.getElementById('sidebar').classList.toggle('open');
    elements.createChannelFab.onclick=()=>elements.channelModal.classList.add('active');
    elements.closeModal.onclick=()=>elements.channelModal.classList.remove('active');
</script>
</body>
</html>
