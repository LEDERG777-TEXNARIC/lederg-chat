<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>LEDERG TG — надёжный мессенджер</title>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ---------- GLOBAL STYLES (Telegram-like, LEDERG accent) ---------- */
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root {
      --tg-bg: #0e1621; --tg-sidebar: #17212b; --tg-header: #1f2a36;
      --tg-card: #1f2a36; --tg-input: #242f3d; --tg-text: #f5f5f5;
      --tg-accent: #2b9c5e; --tg-msg-mine: #2b5278; --tg-msg-other: #182533;
      --tg-border: #2b3643; --tg-radius: 20px;
    }
    body.light {
      --tg-bg: #f5f5f5; --tg-sidebar: #ffffff; --tg-header: #ffffff;
      --tg-card: #ffffff; --tg-input: #e8e8e8; --tg-text: #000;
      --tg-msg-mine: #eeffde; --tg-msg-other: #ffffff;
      --tg-border: #d0d0d0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: var(--tg-bg); color: var(--tg-text); height: 100vh; overflow: hidden;
      display: flex; flex-direction: column;
    }
    /* Auth screen */
    .auth-screen {
      display: flex; justify-content: center; align-items: center; height: 100vh;
      background: linear-gradient(135deg, #17212b, #0e1621);
    }
    .auth-card {
      background: var(--tg-card); border-radius: 32px; padding: 2rem;
      width: 90%; max-width: 360px; box-shadow: 0 12px 32px rgba(0,0,0,0.4);
    }
    .auth-card h2 { text-align: center; margin-bottom: 1.5rem; }
    .auth-card input {
      width: 100%; padding: 14px 16px; margin-bottom: 12px;
      background: var(--tg-input); border: none; border-radius: 16px;
      color: var(--tg-text); font-size: 1rem; outline: none;
    }
    .auth-card button {
      width: 100%; padding: 12px; background: var(--tg-accent);
      border: none; border-radius: 28px; color: white; font-weight: bold; cursor: pointer;
    }
    .toggle-mode { text-align: center; margin-top: 16px; color: var(--tg-accent); cursor: pointer; }
    .auth-error { color: #ff6b6b; text-align: center; margin-top: 8px; font-size: 0.8rem; }
    /* Main messenger layout */
    .messenger {
      display: none; flex: 1; flex-direction: column; height: 100vh;
    }
    .content-area {
      display: flex; flex: 1; overflow: hidden;
    }
    /* Sidebar (chat list) */
    .sidebar {
      width: 320px; background: var(--tg-sidebar); border-right: 1px solid var(--tg-border);
      display: flex; flex-direction: column; transition: transform 0.3s;
    }
    .profile-bar {
      padding: 12px 16px; background: var(--tg-header); border-bottom: 1px solid var(--tg-border);
      display: flex; align-items: center; gap: 10px;
    }
    .avatar-sm {
      width: 40px; height: 40px; border-radius: 50%; background: var(--tg-accent);
      display: flex; align-items: center; justify-content: center; font-weight: bold; color: white;
    }
    .nick { font-weight: 600; flex: 1; }
    .search-box {
      padding: 8px 12px; border-bottom: 1px solid var(--tg-border);
    }
    .search-box input {
      width: 100%; padding: 10px 14px; background: var(--tg-input); border: none;
      border-radius: 24px; color: var(--tg-text); outline: none;
    }
    .chat-list { flex: 1; overflow-y: auto; }
    .chat-item {
      padding: 12px 16px; display: flex; align-items: center; gap: 12px;
      cursor: pointer; border-bottom: 1px solid var(--tg-border);
    }
    .chat-item.active { background: var(--tg-card); }
    .avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--tg-accent); display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 18px; }
    .chat-info { flex: 1; overflow: hidden; }
    .chat-name { font-weight: 500; }
    .chat-last { font-size: 0.75rem; color: var(--tg-text); opacity: 0.7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    /* Chat area */
    .chat-area {
      flex: 1; display: flex; flex-direction: column; min-width: 0;
      background: var(--tg-bg);
    }
    .chat-header {
      padding: 10px 16px; background: var(--tg-header); border-bottom: 1px solid var(--tg-border);
      display: flex; align-items: center; gap: 10px;
    }
    .chat-header .back-btn { display: none; background: none; border: none; color: var(--tg-text); font-size: 1.5rem; cursor: pointer; }
    .chat-title { font-weight: 600; flex: 1; }
    .messages {
      flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px;
      background: var(--tg-bg);
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Ccircle cx='15' cy='15' r='2'/%3E%3Ccircle cx='45' cy='45' r='2'/%3E%3Ccircle cx='30' cy='30' r='1.5'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .msg {
      max-width: 75%; padding: 8px 12px; border-radius: 16px;
      position: relative; word-wrap: break-word; animation: fadeIn 0.1s;
    }
    .msg.mine { align-self: flex-end; background: var(--tg-msg-mine); border-bottom-right-radius: 4px; }
    .msg.other { align-self: flex-start; background: var(--tg-msg-other); border-bottom-left-radius: 4px; }
    .msg .time { font-size: 0.65rem; opacity: 0.7; text-align: right; margin-top: 4px; }
    .msg img { max-width: 200px; border-radius: 12px; margin-top: 4px; }
    .compose {
      padding: 8px 12px; background: var(--tg-header); border-top: 1px solid var(--tg-border);
      display: flex; align-items: center; gap: 8px;
    }
    .compose input {
      flex: 1; padding: 10px 16px; background: var(--tg-input); border: none;
      border-radius: 24px; color: var(--tg-text); outline: none;
    }
    .send-btn {
      width: 42px; height: 42px; border-radius: 50%; background: var(--tg-accent);
      color: white; border: none; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .typing { font-size: 0.7rem; color: var(--tg-text); opacity: 0.6; padding: 0 12px; }
    /* FAB */
    .fab {
      position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px;
      border-radius: 50%; background: var(--tg-accent); color: white;
      display: flex; align-items: center; justify-content: center; font-size: 24px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3); cursor: pointer; z-index: 30;
      transition: transform 0.2s, opacity 0.2s;
    }
    .fab.hidden { transform: scale(0); opacity: 0; pointer-events: none; }
    /* Bottom nav (mobile) */
    .bottom-nav {
      display: none; justify-content: space-around; align-items: center;
      background: var(--tg-header); border-top: 1px solid var(--tg-border);
      padding: 8px 0; position: fixed; bottom: 0; left: 0; right: 0; z-index: 25;
    }
    .bottom-nav .nav-item {
      background: none; border: none; color: var(--tg-text); font-size: 1.2rem;
      padding: 8px; border-radius: 12px; cursor: pointer;
    }
    .bottom-nav .nav-item.active { color: var(--tg-accent); }
    @media (max-width: 700px) {
      .sidebar { position: fixed; left: 0; top: 0; height: 100%; z-index: 40; transform: translateX(-100%); width: 280px; }
      .sidebar.open { transform: translateX(0); }
      .chat-header .back-btn { display: block; }
      .compose { padding-bottom: 16px; } /* space for bottom nav */
      .bottom-nav { display: flex; }
      .fab { bottom: 80px; } /* выше нижней панели */
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } }
  </style>
</head>
<body class="light">
  <!-- AUTH -->
  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <h2>⚡ LEDERG</h2>
      <input type="email" id="emailInput" placeholder="Email">
      <input type="password" id="passwordInput" placeholder="Пароль">
      <input type="text" id="nicknameInput" placeholder="Никнейм" style="display:none;">
      <button id="submitAuthBtn">Войти</button>
      <div class="toggle-mode" id="toggleAuthMode">Создать аккаунт</div>
      <div id="authError" class="auth-error"></div>
    </div>
  </div>

  <!-- MESSENGER -->
  <div id="messenger" class="messenger">
    <div class="content-area">
      <div id="sidebar" class="sidebar">
        <div class="profile-bar">
          <div class="avatar-sm" id="userAvatar">?</div>
          <div class="nick" id="userNick"></div>
          <button id="logoutBtn" style="background:none;border:none;color:var(--tg-text);cursor:pointer;"><i class="fas fa-sign-out-alt"></i></button>
        </div>
        <div class="search-box">
          <input type="text" id="globalSearch" placeholder="🔍 Поиск...">
        </div>
        <div class="chat-list" id="chatList"></div>
      </div>
      <div class="chat-area" id="chatArea">
        <div class="chat-header">
          <button class="back-btn" id="backBtn"><i class="fas fa-bars"></i></button>
          <div class="chat-title" id="chatTitle">LEDERG</div>
          <button id="searchInChatBtn" style="background:none;border:none;color:var(--tg-text);"><i class="fas fa-search"></i></button>
        </div>
        <div class="typing" id="typingIndicator"></div>
        <div class="messages" id="messagesContainer"></div>
        <div class="compose" id="composeArea" style="display:none;">
          <button id="emojiBtn" style="background:none;border:none;color:var(--tg-text);"><i class="far fa-smile"></i></button>
          <button id="attachBtn" style="background:none;border:none;color:var(--tg-text);"><i class="fas fa-paperclip"></i></button>
          <input type="text" id="messageInput" placeholder="Сообщение...">
          <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
    </div>
    <div class="fab hidden" id="createChannelFab"><i class="fas fa-plus"></i></div>
    <div class="bottom-nav">
      <button class="nav-item active" id="navChats"><i class="fas fa-comment"></i></button>
      <button class="nav-item" id="navChannels"><i class="fas fa-broadcast-tower"></i></button>
    </div>
  </div>

  <script>
    // ===================== FIREBASE CONFIG =====================
    const firebaseConfig = {
      apiKey: "AIzaSyBMovcf0WC7bHYzeIKo7N5FYgvJOlSmiec",
      authDomain: "lederg-messages.firebaseapp.com",
      databaseURL: "https://lederg-messages-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "lederg-messages",
      storageBucket: "lederg-messages.firebasestorage.app",
      messagingSenderId: "753662822873",
      appId: "1:753662822873:web:0635ccd83a5f061546f1c8",
      measurementId: "G-SG186R72QV"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // ---------- STATE ----------
    let currentUser = null;
    let currentChatSession = null; // объект сессии чата
    const MSG_PAGE_SIZE = 30;

    // DOM references
    const authScreen = document.getElementById('authScreen');
    const messenger = document.getElementById('messenger');
    const authBtn = document.getElementById('submitAuthBtn');
    const authError = document.getElementById('authError');
    const userAvatar = document.getElementById('userAvatar');
    const userNick = document.getElementById('userNick');
    const chatList = document.getElementById('chatList');
    const chatTitle = document.getElementById('chatTitle');
    const messagesContainer = document.getElementById('messagesContainer');
    const composeArea = document.getElementById('composeArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const typingIndicator = document.getElementById('typingIndicator');
    const fab = document.getElementById('createChannelFab');
    const backBtn = document.getElementById('backBtn');
    const globalSearch = document.getElementById('globalSearch');

    // ---------- AUTH ----------
    let isLogin = true;
    document.getElementById('toggleAuthMode').onclick = () => {
      isLogin = !isLogin;
      document.getElementById('nicknameInput').style.display = isLogin ? 'none' : 'block';
      authBtn.textContent = isLogin ? 'Войти' : 'Зарегистрироваться';
    };
    authBtn.onclick = async () => {
      const email = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('passwordInput').value.trim();
      const nickname = document.getElementById('nicknameInput').value.trim();
      if (!email || !password) return authError.innerText = 'Заполните поля';
      try {
        if (isLogin) await auth.signInWithEmailAndPassword(email, password);
        else {
          const { user } = await auth.createUserWithEmailAndPassword(email, password);
          await db.ref(`users/${user.uid}`).set({ nickname, email });
        }
      } catch (e) { authError.innerText = e.message; }
    };

    auth.onAuthStateChanged(async (user) => {
      if (user) {
        currentUser = user;
        const snap = await db.ref(`users/${user.uid}`).once('value');
        const profile = snap.val() || {};
        currentUser.displayName = profile.nickname || 'User';
        userNick.innerText = currentUser.displayName;
        userAvatar.innerText = currentUser.displayName[0].toUpperCase();
        authScreen.style.display = 'none';
        messenger.style.display = 'flex';
        initMessenger();
      } else {
        currentUser = null;
        authScreen.style.display = 'flex';
        messenger.style.display = 'none';
        if (currentChatSession) currentChatSession.destroy();
      }
    });

    // ---------- MESSENGER CORE ----------
    async function initMessenger() {
      document.getElementById('globalSearch').addEventListener('keypress', handleSearch);
      backBtn.addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));
      fab.onclick = createChannel;
      document.getElementById('navChats').onclick = () => switchTab('chats');
      document.getElementById('navChannels').onclick = () => switchTab('channels');
      loadChats();
    }

    // Chat session manager
    class ChatSession {
      constructor(chat) {
        this.chat = chat; // { id, type, name }
        this.messagesRef = null;
        this.messagesListener = null;
        this.typingRef = null;
        this.typingListener = null;
        this.init();
      }
      init() {
        const path = this.chat.type === 'private' ? `messages/${this.chat.id}` : `channel_messages/${this.chat.id}`;
        this.messagesRef = db.ref(path);
        // сначала грузим последние MSG_PAGE_SIZE сообщений
        this.messagesRef.limitToLast(MSG_PAGE_SIZE).on('value', (snap) => {
          const data = snap.val() || {};
          const messages = Object.entries(data).map(([id, m]) => ({ id, ...m })).sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
          renderMessages(messages);
        });
        // typing
        const typingPath = `typing/${this.chat.type === 'private' ? this.chat.id : 'channel_' + this.chat.id}`;
        this.typingRef = db.ref(typingPath);
        this.typingListener = this.typingRef.on('value', (snap) => {
          const vals = snap.val() || {};
          const someoneTyping = Object.keys(vals).some(uid => uid !== currentUser.uid);
          typingIndicator.innerText = someoneTyping ? 'печатает...' : '';
        });
        // показываем FAB только в общем списке
        fab.classList.add('hidden');
        composeArea.style.display = 'flex';
        chatTitle.innerText = this.chat.name;
      }
      destroy() {
        if (this.messagesRef) this.messagesRef.off('value', this.messagesListener);
        if (this.typingRef) this.typingRef.off('value', this.typingListener);
        fab.classList.remove('hidden');
        composeArea.style.display = 'none';
        typingIndicator.innerText = '';
      }
      sendMessage(text, media = null) {
        if (!text && !media) return;
        const msg = {
          fromUid: currentUser.uid,
          fromNick: currentUser.displayName,
          timestamp: Date.now(),
        };
        if (media) { msg.mediaType = 'image'; msg.text = media; }
        else msg.text = text;
        this.messagesRef.push(msg);
        if (this.chat.type === 'private') {
          db.ref(`conversations/${this.chat.id}/lastMessage`).set(text || '📷 Изображение');
          db.ref(`conversations/${this.chat.id}/lastUpdated`).set(Date.now());
        }
      }
    }

    function openChat(chat) {
      if (currentChatSession) currentChatSession.destroy();
      currentChatSession = new ChatSession(chat);
      // мобильное закрытие сайдбара
      if (window.innerWidth <= 700) document.getElementById('sidebar').classList.remove('open');
    }

    function renderMessages(msgs) {
      messagesContainer.innerHTML = '';
      if (!msgs.length) return;
      msgs.forEach(msg => {
        const div = document.createElement('div');
        div.className = `msg ${msg.fromUid === currentUser.uid ? 'mine' : 'other'}`;
        let content = '';
        if (msg.mediaType === 'image') content = `<img src="${msg.text}" />`;
        else content = escapeHtml(msg.text || '');
        div.innerHTML = `${content}<div class="time">${new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>`;
        messagesContainer.appendChild(div);
      });
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function escapeHtml(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

    // Отправка
    sendBtn.onclick = () => {
      if (!currentChatSession) return;
      const text = messageInput.value.trim();
      currentChatSession.sendMessage(text);
      messageInput.value = '';
    };
    messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendBtn.click(); });

    // Эмодзи (заглушка)
    document.getElementById('emojiBtn').onclick = () => messageInput.value += '😊';

    // Поиск и создание чата
    async function handleSearch(e) {
      if (e.key !== 'Enter') return;
      const q = globalSearch.value.trim().toLowerCase();
      if (!q) return;
      const usersSnap = await db.ref('users').once('value');
      const users = usersSnap.val() || {};
      const found = Object.entries(users).find(([uid, u]) => u.nickname?.toLowerCase().includes(q) && uid !== currentUser.uid);
      if (!found) return alert('Не найдено');
      const [otherUid, otherUser] = found;
      const convId = [currentUser.uid, otherUid].sort().join('_');
      await db.ref(`conversations/${convId}`).set({
        participants: [currentUser.uid, otherUid],
        lastUpdated: Date.now()
      });
      globalSearch.value = '';
      loadChats();
      openChat({ id: convId, type: 'private', name: otherUser.nickname });
    }

    async function createChannel() {
      const name = prompt('Название канала:');
      if (!name) return;
      const ref = db.ref('channels').push();
      await ref.set({ name, createdBy: currentUser.uid });
      await db.ref(`channel_members/${ref.key}/${currentUser.uid}`).set(true);
      loadChats();
    }

    // Загрузка списка чатов
    async function loadChats() {
      chatList.innerHTML = '';
      const convSnap = await db.ref('conversations').once('value');
      const convs = convSnap.val() || {};
      const myId = currentUser.uid;
      for (const [id, conv] of Object.entries(convs)) {
        if (!conv.participants?.includes(myId)) continue;
        const otherId = conv.participants.find(uid => uid !== myId);
        const userSnap = await db.ref(`users/${otherId}/nickname`).once('value');
        const nick = userSnap.val() || 'User';
        const el = createChatElement(id, 'private', nick, conv.lastMessage || '', nick[0].toUpperCase());
        chatList.appendChild(el);
      }
      const chanSnap = await db.ref('channels').once('value');
      const chans = chanSnap.val() || {};
      for (const [id, ch] of Object.entries(chans)) {
        const el = createChatElement(id, 'channel', ch.name, 'Канал', '#');
        chatList.appendChild(el);
      }
    }

    function createChatElement(id, type, name, lastMsg, avatarChar) {
      const div = document.createElement('div');
      div.className = 'chat-item';
      div.innerHTML = `<div class="avatar">${avatarChar}</div><div class="chat-info"><div class="chat-name">${name}</div><div class="chat-last">${escapeHtml(lastMsg)}</div></div>`;
      div.onclick = () => openChat({ id, type, name });
      return div;
    }

    function switchTab(tab) {
      // фильтрация списка чатов (упрощённо)
      // для полной реализации нужно хранить отдельно, здесь просто меняем активную кнопку
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.getElementById(tab === 'chats' ? 'navChats' : 'navChannels').classList.add('active');
    }

    // Инициализация
  </script>
</body>
</html>
