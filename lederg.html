<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LEDERG · Мессенджер будущего</title>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Emoji Picker -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.21.0/index.css">
    <script type="module">
        import { Picker } from 'https://cdn.jsdelivr.net/npm/emoji-picker-element@1.21.0/index.js';
        window.EmojiPicker = { Picker };
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg-gradient-start: #0a0f1a;
            --bg-gradient-end: #0e1621;
            --glass-bg: rgba(30, 40, 55, 0.75);
            --glass-border: rgba(43, 156, 94, 0.3);
            --accent: #2b9c5e;
            --accent-glow: #3baf6e;
            --text-primary: #ffffff;
            --text-secondary: #a0b3c9;
            --input-bg: rgba(20, 30, 45, 0.8);
            --message-self: #2b9c5e;
            --message-other: #1a2633;
        }
        body {
            font-family: 'Inter', -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: radial-gradient(circle at 20% 30%, #0e1621, #05080f);
            height: 100vh;
            overflow: hidden;
            color: var(--text-primary);
            backdrop-filter: blur(2px);
        }
        /* LEDERG уникальный фон с частицами */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><circle cx="30" cy="40" r="1.5" fill="%232b9c5e" opacity="0.4"/><circle cx="170" cy="80" r="2" fill="%232b9c5e" opacity="0.3"/><circle cx="90" cy="150" r="1.5" fill="%232b9c5e" opacity="0.5"/><circle cx="150" cy="30" r="1" fill="%232b9c5e" opacity="0.6"/><circle cx="10" cy="180" r="2" fill="%232b9c5e" opacity="0.2"/></svg>');
            background-repeat: repeat;
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }
        /* Стеклянный эффект */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
        }
        /* Авторизация */
        .auth-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle at 30% 10%, #0a1420, #03060b);
            position: relative;
            z-index: 2;
        }
        .auth-card {
            background: rgba(20, 30, 45, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(43, 156, 94, 0.4);
            border-radius: 48px;
            padding: 2rem;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .auth-card h2 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #2b9c5e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .auth-card input {
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 12px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .auth-card button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #2b9c5e, #1d6e44);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .toggle-mode {
            text-align: center;
            margin-top: 16px;
            color: #8e9eae;
            cursor: pointer;
        }
        /* Основной экран */
        .chat-screen {
            display: none;
            height: 100vh;
            width: 100%;
            position: relative;
            z-index: 2;
        }
        .main-layout {
            display: flex;
            height: 100%;
        }
        /* Боковая панель */
        .sidebar {
            width: 320px;
            background: rgba(23, 33, 43, 0.7);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(43, 156, 94, 0.3);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }
        .user-info {
            padding: 20px 16px;
            background: rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-details {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #2b9c5e, #1a5a38);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 0 12px rgba(43,156,94,0.5);
        }
        .user-nick {
            font-weight: 600;
        }
        .logout-btn, .settings-btn {
            background: none;
            border: none;
            color: #a0b3c9;
            font-size: 1.2rem;
            cursor: pointer;
            margin-left: 8px;
        }
        .tabs {
            display: flex;
            padding: 12px;
            gap: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .tab-btn {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: none;
            border-radius: 30px;
            padding: 8px;
            color: white;
            cursor: pointer;
        }
        .tab-btn.active {
            background: var(--accent);
        }
        .search-box {
            padding: 12px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            color: white;
        }
        .search-results {
            position: absolute;
            top: 60px;
            left: 12px;
            right: 12px;
            background: #1a2633;
            border-radius: 20px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 30;
            display: none;
        }
        .chats-list {
            flex: 1;
            overflow-y: auto;
        }
        .chat-item {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .chat-item.active {
            background: rgba(43,156,94,0.2);
        }
        .chat-info {
            flex: 1;
        }
        .chat-name {
            font-weight: 500;
        }
        .chat-last {
            font-size: 0.7rem;
            color: #8e9eae;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        /* Область чата */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .chat-header {
            padding: 16px;
            background: rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(10px);
        }
        .back-btn {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
        }
        .chat-title {
            flex: 1;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 75%;
            animation: fadeIn 0.1s;
        }
        .message-self {
            align-self: flex-end;
        }
        .message-bubble {
            background: var(--message-other);
            padding: 8px 14px;
            border-radius: 20px;
            border-bottom-left-radius: 4px;
        }
        .message-self .message-bubble {
            background: var(--message-self);
            border-bottom-right-radius: 4px;
        }
        .message-meta {
            font-size: 0.65rem;
            color: #8e9eae;
            margin: 4px 8px 0;
        }
        .input-area {
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .input-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        #messageInput {
            flex: 1;
            padding: 12px 18px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            color: white;
            outline: none;
        }
        .tool-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 8px;
        }
        .fab {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #2b9c5e, #1a5a38);
            width: 56px;
            height: 56px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(43,156,94,0.5);
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-content {
            background: #1a2633;
            border-radius: 28px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }
        @media (max-width: 680px) {
            .sidebar {
                position: absolute;
                left: 0;
                top: 0;
                height: 100%;
                width: 280px;
                transform: translateX(-100%);
                z-index: 50;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .back-btn {
                display: block;
            }
            .message {
                max-width: 85%;
            }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="app">
    <div id="authScreen" class="auth-screen">
        <div class="auth-card">
            <h2>⚡ LEDERG</h2>
            <input type="email" id="emailInput" placeholder="Email">
            <input type="password" id="passwordInput" placeholder="Пароль">
            <input type="text" id="nicknameInput" placeholder="Никнейм" style="display: none;">
            <button id="submitAuthBtn">Войти</button>
            <div class="toggle-mode" id="toggleAuthMode">Создать аккаунт</div>
            <div id="authError" class="error-msg"></div>
        </div>
    </div>
    <div id="chatScreen" class="chat-screen">
        <div class="main-layout">
            <div id="sidebar" class="sidebar">
                <div class="user-info">
                    <div class="user-details">
                        <div class="avatar" id="userAvatar">U</div>
                        <span id="userNickDisplay" class="user-nick"></span>
                    </div>
                    <div>
                        <button id="settingsBtn" class="settings-btn"><i class="fas fa-cog"></i></button>
                        <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i></button>
                    </div>
                </div>
                <div class="tabs">
                    <button id="tabChats" class="tab-btn active">💬 Чаты</button>
                    <button id="tabChannels" class="tab-btn">📢 Каналы</button>
                </div>
                <div class="search-box">
                    <input type="text" id="globalSearch" placeholder="🔍 Поиск людей и каналов...">
                    <div id="searchResultsPanel" class="search-results"></div>
                </div>
                <div id="chatsList" class="chats-list"></div>
            </div>
            <div class="chat-area">
                <div class="chat-header">
                    <button id="backBtn" class="back-btn"><i class="fas fa-bars"></i></button>
                    <div class="chat-title" id="currentChatTitle">LEDERG</div>
                    <button id="channelInfoBtn" style="display:none; background:none; border:none; color:white;"><i class="fas fa-info-circle"></i></button>
                </div>
                <div id="messagesArea" class="messages-area"></div>
                <div class="input-area">
                    <div class="input-row">
                        <button id="emojiBtn" class="tool-btn"><i class="far fa-smile-wink"></i></button>
                        <button id="attachBtn" class="tool-btn"><i class="fas fa-paperclip"></i></button>
                        <input type="text" id="messageInput" placeholder="Сообщение...">
                        <button id="sendBtn" class="tool-btn"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>
        <div id="createChannelFab" class="fab"><i class="fas fa-plus"></i></div>
    </div>
</div>

<script>
    // ===================== ВАШИ КЛЮЧИ SUPABASE =====================
    const SUPABASE_URL = 'https://ваш-проект.supabase.co';   // ЗАМЕНИТЕ
    const SUPABASE_ANON_KEY = 'ваш-anon-ключ';               // ЗАМЕНИТЕ
    // =============================================================

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null;
    let currentChat = null;   // { id, type, name, other_user_id? }
    let messagesSubscription = null;
    let allUsers = [];
    let allChannels = [];
    let userChats = [];
    let activeTab = 'chats';

    // DOM elements
    const authScreen = document.getElementById('authScreen');
    const chatScreen = document.getElementById('chatScreen');
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const nicknameInput = document.getElementById('nicknameInput');
    const submitBtn = document.getElementById('submitAuthBtn');
    const toggleMode = document.getElementById('toggleAuthMode');
    const authError = document.getElementById('authError');
    const userNickDisplay = document.getElementById('userNickDisplay');
    const userAvatar = document.getElementById('userAvatar');
    const logoutBtn = document.getElementById('logoutBtn');
    const settingsBtn = document.getElementById('settingsBtn');
    const globalSearch = document.getElementById('globalSearch');
    const searchResultsPanel = document.getElementById('searchResultsPanel');
    const chatsListDiv = document.getElementById('chatsList');
    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const currentChatTitle = document.getElementById('currentChatTitle');
    const backBtn = document.getElementById('backBtn');
    const tabChats = document.getElementById('tabChats');
    const tabChannels = document.getElementById('tabChannels');
    const createChannelFab = document.getElementById('createChannelFab');
    const channelInfoBtn = document.getElementById('channelInfoBtn');

    let isLoginMode = true;
    toggleMode.onclick = () => {
        isLoginMode = !isLoginMode;
        nicknameInput.style.display = isLoginMode ? 'none' : 'block';
        submitBtn.innerText = isLoginMode ? 'Войти' : 'Зарегистрироваться';
        toggleMode.innerText = isLoginMode ? 'Создать аккаунт' : 'Уже есть аккаунт? Войти';
    };
    nicknameInput.style.display = 'none';

    // Авторизация
    submitBtn.onclick = async () => {
        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();
        const nickname = nicknameInput.value.trim();
        authError.innerText = '';
        if (!email || !password) { authError.innerText = 'Заполните поля'; return; }
        if (!isLoginMode && !nickname) { authError.innerText = 'Укажите никнейм'; return; }
        try {
            if (isLoginMode) {
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
            } else {
                const { data, error } = await supabase.auth.signUp({ email, password });
                if (error) throw error;
                // Создаём запись в таблице users
                const { error: profileError } = await supabase.from('users').insert([{ id: data.user.id, email, nickname }]);
                if (profileError) throw profileError;
            }
        } catch (err) { authError.innerText = err.message; }
    };

    supabase.auth.onAuthStateChange(async (event, session) => {
        if (session?.user) {
            currentUser = session.user;
            const { data: userData } = await supabase.from('users').select('*').eq('id', currentUser.id).single();
            if (userData) {
                currentUser.nickname = userData.nickname;
                userNickDisplay.innerText = userData.nickname;
                userAvatar.innerText = userData.nickname.charAt(0).toUpperCase();
            } else {
                userNickDisplay.innerText = 'User';
                userAvatar.innerText = 'U';
            }
            authScreen.style.display = 'none';
            chatScreen.style.display = 'block';
            await loadAllUsers();
            await loadAllChannels();
            await loadUserChats();
            setupSearch();
            // онлайн статус
            await supabase.from('users').update({ online: true }).eq('id', currentUser.id);
            window.addEventListener('beforeunload', () => {
                supabase.from('users').update({ online: false }).eq('id', currentUser.id);
            });
        } else {
            authScreen.style.display = 'flex';
            chatScreen.style.display = 'none';
            if (messagesSubscription) messagesSubscription.unsubscribe();
            currentChat = null;
        }
    });

    async function loadAllUsers() {
        const { data } = await supabase.from('users').select('id, nickname');
        allUsers = data || [];
    }
    async function loadAllChannels() {
        const { data } = await supabase.from('channels').select('*');
        allChannels = data || [];
    }
    async function loadUserChats() {
        // Личные диалоги
        const { data: convs } = await supabase
            .from('conversations')
            .select('*, participant1, participant2, last_message, last_updated')
            .or(`participant1.eq.${currentUser.id},participant2.eq.${currentUser.id}`);
        let privateChats = [];
        for (let conv of (convs || [])) {
            const otherId = conv.participant1 === currentUser.id ? conv.participant2 : conv.participant1;
            const otherUser = allUsers.find(u => u.id === otherId);
            if (otherUser) {
                privateChats.push({
                    id: conv.id,
                    type: 'private',
                    name: otherUser.nickname,
                    otherId: otherId,
                    lastMessage: conv.last_message,
                    lastUpdated: conv.last_updated,
                    avatar: otherUser.nickname.charAt(0).toUpperCase()
                });
            }
        }
        // Каналы
        const { data: members } = await supabase.from('channel_members').select('channel_id').eq('user_id', currentUser.id);
        let channelChats = [];
        for (let m of (members || [])) {
            const chan = allChannels.find(c => c.id === m.channel_id);
            if (chan) {
                const { data: lastMsg } = await supabase.from('channel_messages').select('text').eq('channel_id', chan.id).order('created_at', { ascending: false }).limit(1);
                channelChats.push({
                    id: chan.id,
                    type: 'channel',
                    name: chan.name,
                    lastMessage: lastMsg?.[0]?.text || '',
                    lastUpdated: chan.created_at,
                    avatar: chan.name.charAt(0).toUpperCase()
                });
            }
        }
        userChats = [...privateChats, ...channelChats].sort((a,b) => new Date(b.lastUpdated) - new Date(a.lastUpdated));
        renderChatsList();
    }

    function renderChatsList() {
        let filtered = userChats.filter(c => activeTab === 'channels' ? c.type === 'channel' : c.type === 'private');
        chatsListDiv.innerHTML = '';
        if (!filtered.length) {
            chatsListDiv.innerHTML = '<div style="padding:20px;text-align:center;color:#8e9eae;">Нет чатов</div>';
            return;
        }
        filtered.forEach(chat => {
            const div = document.createElement('div');
            div.className = 'chat-item';
            if (currentChat?.id === chat.id && currentChat?.type === chat.type) div.classList.add('active');
            div.innerHTML = `
                <div class="avatar">${chat.avatar}</div>
                <div class="chat-info">
                    <div class="chat-name">${escapeHtml(chat.name)}</div>
                    <div class="chat-last">${escapeHtml(chat.lastMessage || 'Нет сообщений')}</div>
                </div>
            `;
            div.onclick = () => openChat(chat);
            chatsListDiv.appendChild(div);
        });
    }

    async function openChat(chat) {
        if (messagesSubscription) messagesSubscription.unsubscribe();
        currentChat = chat;
        currentChatTitle.innerText = chat.name;
        messagesArea.innerHTML = '<div style="text-align:center;"><i class="fas fa-spinner fa-pulse"></i> Загрузка...</div>';
        let channelName = 'messages';
        let filterField = chat.type === 'private' ? 'conversation_id' : 'channel_id';
        const { data: msgs, error } = await supabase
            .from(chat.type === 'private' ? 'messages' : 'channel_messages')
            .select('*')
            .eq(filterField, chat.id)
            .order('created_at', { ascending: true });
        if (!error) renderMessages(msgs);
        // Подписка
        messagesSubscription = supabase
            .channel(`realtime:${chat.type === 'private' ? 'messages' : 'channel_messages'}`)
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: chat.type === 'private' ? 'messages' : 'channel_messages', filter: `${filterField}=eq.${chat.id}` }, payload => {
                const newMsg = payload.new;
                renderMessages([...msgs, newMsg]);
            })
            .subscribe();
        if (window.innerWidth <= 680) document.getElementById('sidebar').classList.remove('open');
        renderChatsList();
        if (chat.type === 'channel') channelInfoBtn.style.display = 'inline-block';
        else channelInfoBtn.style.display = 'none';
    }

    function renderMessages(msgs) {
        messagesArea.innerHTML = '';
        if (!msgs.length) {
            messagesArea.innerHTML = '<div style="text-align:center;color:#8e9eae;">Сообщений пока нет</div>';
            return;
        }
        msgs.forEach(msg => {
            const isSelf = msg.from_user_id === currentUser.id;
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isSelf ? 'message-self' : ''}`;
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerText = msg.text || (msg.media_type === 'image' ? '📷 Изображение' : '🎤 Аудио');
            if (msg.media_url && msg.media_type === 'image') bubble.innerHTML = `<img src="${msg.media_url}" style="max-width:200px; border-radius:12px;">`;
            if (msg.media_url && msg.media_type === 'audio') bubble.innerHTML = `<audio controls src="${msg.media_url}"></audio>`;
            const meta = document.createElement('div');
            meta.className = 'message-meta';
            const authorName = isSelf ? 'Вы' : (allUsers.find(u => u.id === msg.from_user_id)?.nickname || 'Пользователь');
            meta.innerText = `${authorName} · ${new Date(msg.created_at).toLocaleTimeString()}`;
            msgDiv.appendChild(bubble);
            msgDiv.appendChild(meta);
            messagesArea.appendChild(msgDiv);
        });
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    async function sendMessage(text) {
        if (!text.trim() || !currentChat) return;
        const messageData = {
            from_user_id: currentUser.id,
            text: text.trim(),
            created_at: new Date().toISOString()
        };
        if (currentChat.type === 'private') {
            messageData.conversation_id = currentChat.id;
            await supabase.from('messages').insert([messageData]);
        } else {
            messageData.channel_id = currentChat.id;
            await supabase.from('channel_messages').insert([messageData]);
        }
        messageInput.value = '';
    }

    sendBtn.onclick = () => sendMessage(messageInput.value);
    messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(messageInput.value); });

    // Поиск людей и каналов
    function setupSearch() {
        let debounce;
        globalSearch.addEventListener('input', (e) => {
            clearTimeout(debounce);
            const query = e.target.value.trim().toLowerCase();
            if (query.length < 2) { searchResultsPanel.style.display = 'none'; return; }
            debounce = setTimeout(async () => {
                const users = allUsers.filter(u => u.id !== currentUser.id && u.nickname.toLowerCase().includes(query));
                const channels = allChannels.filter(ch => !userChats.some(uc => uc.type === 'channel' && uc.id === ch.id) && ch.name.toLowerCase().includes(query));
                if (!users.length && !channels.length) { searchResultsPanel.style.display = 'none'; return; }
                searchResultsPanel.innerHTML = '';
                users.slice(0,5).forEach(u => {
                    const div = document.createElement('div'); div.className = 'search-result'; div.innerHTML = `<i class="fas fa-user"></i> ${escapeHtml(u.nickname)}`;
                    div.onclick = () => startPrivateChat(u.id, u.nickname);
                    searchResultsPanel.appendChild(div);
                });
                channels.forEach(ch => {
                    const div = document.createElement('div'); div.className = 'search-result'; div.innerHTML = `<i class="fas fa-bullhorn"></i> ${escapeHtml(ch.name)} (канал)`;
                    div.onclick = () => joinChannel(ch.id);
                    searchResultsPanel.appendChild(div);
                });
                searchResultsPanel.style.display = 'block';
            }, 300);
        });
        document.addEventListener('click', (e) => {
            if (!searchResultsPanel.contains(e.target) && e.target !== globalSearch) searchResultsPanel.style.display = 'none';
        });
    }
    async function startPrivateChat(otherId, otherNick) {
        // Находим или создаём диалог
        let { data: existing } = await supabase
            .from('conversations')
            .select('*')
            .or(`and(participant1.eq.${currentUser.id},participant2.eq.${otherId}),and(participant1.eq.${otherId},participant2.eq.${currentUser.id})`)
            .single();
        if (!existing) {
            const { data: newConv } = await supabase
                .from('conversations')
                .insert([{ participant1: currentUser.id, participant2: otherId, last_updated: new Date() }])
                .select()
                .single();
            existing = newConv;
        }
        await loadUserChats();
        const chat = userChats.find(c => c.type === 'private' && c.otherId === otherId);
        if (chat) openChat(chat);
        globalSearch.value = '';
        searchResultsPanel.style.display = 'none';
    }
    async function joinChannel(channelId) {
        await supabase.from('channel_members').insert([{ channel_id: channelId, user_id: currentUser.id }]);
        await loadAllChannels();
        await loadUserChats();
        const chat = userChats.find(c => c.type === 'channel' && c.id === channelId);
        if (chat) openChat(chat);
        globalSearch.value = '';
    }

    createChannelFab.onclick = () => {
        const name = prompt('Название канала');
        if (name) supabase.from('channels').insert([{ name, created_by: currentUser.id }]).then(() => {
            loadAllChannels(); loadUserChats();
        });
    };

    function escapeHtml(str) { return str?.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])) || ''; }

    tabChats.onclick = () => { activeTab = 'chats'; tabChats.classList.add('active'); tabChannels.classList.remove('active'); renderChatsList(); };
    tabChannels.onclick = () => { activeTab = 'channels'; tabChannels.classList.add('active'); tabChats.classList.remove('active'); renderChatsList(); };
    backBtn.onclick = () => document.getElementById('sidebar').classList.toggle('open');
    logoutBtn.onclick = () => supabase.auth.signOut();
    settingsBtn.onclick = () => alert('Настройки появятся в следующем обновлении');
</script>
</body>
</html>
